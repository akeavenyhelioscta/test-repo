name: helioscta-pjm-da-data-scrapes

services:
  prefect-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - prefect-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 3s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3.6.22-python3.12
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_UI_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@prefect-postgres:5432/prefect
    depends_on:
      prefect-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:4200/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: ["prefect", "server", "start"]

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    env_file:
      - .env.shared
      - .env.${BACKEND_ENV:-prod}
    command:
      - bash
      - -c
      - |
        prefect work-pool create default-agent-pool --type process || true

        # Deploy all prefect.yaml files
        find /app/schedulers/prefect -name '*.yaml' -type f | while read -r yaml_file; do
          echo "========================================="
          echo "Deploying from: $$yaml_file"
          echo "========================================="
          prefect deploy --all --prefect-file "$$yaml_file" || echo "WARNING: Failed to deploy from $$yaml_file"
        done

        # Start worker
        cd /app
        prefect worker start --pool default-agent-pool --work-queue default

volumes:
  prefect-pg-data:
