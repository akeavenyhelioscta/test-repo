source_family: cheniere

defaults:
  base_url: "https://lngconnection.cheniere.com"
  listing_url: "https://lngconnection.cheniere.com"
  datetime_formats:
    - "%Y-%m-%dT%H:%M:%S"
    - "%Y-%m-%dT%H:%M:%S.%f"
    - "%Y-%m-%dT%H:%M:%SZ"
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y"
  # NOTE: React SPA — needs API discovery. May require Selenium or API endpoint.
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  corpus_christi:
    pipe_code: "ccpl"

  creole_trail:
    pipe_code: "ctpl"

  midship:
    pipe_code: "mspl"
