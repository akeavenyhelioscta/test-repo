source_family: standalone

defaults:
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
    - "%m/%d/%y"
    - "%b %d %Y %I:%M %p"
    - "%b %d, %Y %I:%M %p"
    - "%Y-%m-%d"
    - "%Y-%m-%dT%H:%M:%S"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

