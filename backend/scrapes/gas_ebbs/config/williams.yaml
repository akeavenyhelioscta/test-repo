source_family: williams

defaults:
  # Williams serves notices via JSF at 1line.williams.com/xhtml/notice_list.jsf
  # Each pipeline has a unique BUID. critical_ind=Y for critical, N for non-critical.
  jsf_base_url: "https://www.1line.williams.com/xhtml/notice_list.jsf"
  notice_types:
    - "critical"
    - "non-critical"
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y %H:%M:%S %Z"
    - "%m/%d/%Y"
    - "%m/%d/%y"
    - "%b %d, %Y %I:%M %p"
    - "%b %d, %Y"
  listing_url: "https://www.1line.williams.com"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  transco:
    buid: "80"
    base_url: "https://www.1line.williams.com/Transco"

  gulfstream:
    buid: "205"
    base_url: "https://www.1line.williams.com"

  pine_needle:
    buid: "82"
    base_url: "https://www.1line.williams.com/PineNeedle"

  northwest:
    # Northwest: no data found at BUID range 1-300. May be decommissioned or on a different system.
    buid: ""
    base_url: "https://www.1line.williams.com"
    disabled: true

  discovery:
    # Discovery: no data found at BUID range 1-300. May be decommissioned or on a different system.
    buid: ""
    base_url: "https://www.1line.williams.com"
    disabled: true
