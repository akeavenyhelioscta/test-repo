source_family: quorum

defaults:
  base_url: "https://web-prd.myquorumcloud.com"
  # listing_url is not used directly — _get_listing_sources() builds per notice type
  listing_url: "https://web-prd.myquorumcloud.com"
  notice_types:
    - "Y"   # Critical
    - "N"   # Non-Critical
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
    - "%m/%d/%y"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  bbt_alatenn:
    app_code: "BBTPA1IPWS"
    tspno: "3"

  bbt_midla:
    app_code: "BBTPA1IPWS"
    tspno: "6"

  bbt_trans_union:
    app_code: "BBTPA1IPWS"
    tspno: "12"

  ozark_gas:
    app_code: "BBTPA1IPWS"
    tspno: "16"

  high_point:
    app_code: "HPEPA1IPWS"
    tspno: "1"

  chandeleur:
    app_code: "HPEPA1IPWS"
    tspno: "14"

  destin:
