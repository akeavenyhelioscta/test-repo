source_family: tallgrass

defaults:
  base_url: "http://pipeline.tallgrassenergylp.com"
  listing_url: "http://pipeline.tallgrassenergylp.com"
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
  # BLOCKED: Entire site behind Incapsula/Imperva WAF (bot challenge).
  # Plain HTTP returns Incapsula challenge page. Requires Playwright with
  # browser automation to solve challenge, or alternate data source.
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  rockies_express:
    pipeline_label: "REX"
    disabled: true
    disabled_reason: "Incapsula WAF bot challenge — requires Playwright"

  ruby:
    pipeline_label: "Ruby"
    disabled: true
    disabled_reason: "Incapsula WAF bot challenge — requires Playwright"

  tallgrass_interstate:
    pipeline_label: "Tallgrass Interstate"
    disabled: true
    disabled_reason: "Incapsula WAF bot challenge — requires Playwright"

  trailblazer:
    pipeline_label: "Trailblazer"
    disabled: true
    disabled_reason: "Incapsula WAF bot challenge — requires Playwright"
