  notice_pages:
    - page: "Critical"
      url_suffix: "Critical.aspx"
    - page: "NonCritical"
      url_suffix: "NonCritical.aspx"
  datetime_formats:
    - "%b %d %Y %I:%M %p"
    - "%b %d %Y %I:%M:%S %p"
    - "%b %d, %Y %I:%M %p"
