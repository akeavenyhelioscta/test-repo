source_family: kindermorgan

defaults:
  base_url: "https://pipeline2.kindermorgan.com"
  # listing_url is not used directly — _get_listing_sources() builds per notice type
  listing_url: "https://pipeline2.kindermorgan.com"
  notice_types:
    - "C"   # Critical
    - "N"   # Non-Critical
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S%p"
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
    - "%m/%d/%y"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  tennessee_gas_pipeline:
    pipe_code: "TGP"

  natural_gas_pipeline_of_america:
    pipe_code: "NGPL"

  el_paso_natural_gas:
    pipe_code: "EPNG"

  colorado_interstate_gas:
    pipe_code: "CIG"

  cheyenne_plains:
    pipe_code: "CP"

  southern_natural_gas:
    pipe_code: "SNG"

  elba_express:
    pipe_code: "EEC"

  midcontinent_express:
    pipe_code: "MEP"

  mojave_pipeline:
    pipe_code: "MOPC"

  sierrita_gas_pipeline:
    pipe_code: "SGP"

  transcolorado:
    pipe_code: "TCP"

  wyoming_interstate:
    pipe_code: "WIC"

  southern_lng:
    pipe_code: "SLNG"

  kinder_morgan_illinois_pipeline:
    pipe_code: "KMIL"

  kinder_morgan_louisiana_pipeline:
    pipe_code: "KMLP"

  horizon_pipeline:
    pipe_code: "HORZ"

  stagecoach:
    pipe_code: "STAG"

  arlington_storage:
    pipe_code: "ARLS"

  young_gas_storage:
    pipe_code: "YGS"
