source_family: piperiv

defaults:
  listing_url_template: "https://www.piperiv.com/ip/{operator_code}/critical-notices"
  detail_url_template: "https://www.piperiv.com/ip/{operator_code}/notice/{notice_identifier}"
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S%p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
    - "%m/%d/%y"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  algonquin:
    operator_code: "algonquin"

  anr:
    operator_code: "anr"

  columbia_gas:
    operator_code: "columbia"

  el_paso:
    operator_code: "el-paso"

  florida_gas:
    operator_code: "florida"

  gulf_south:
    operator_code: "gulf-south"

  iroquois:
    operator_code: "iroquois"

  millennium:
    operator_code: "millennium"

  mountain_valley:
    operator_code: "mountain-valley"

  northern_natural:
    operator_code: "northern"

  northwest:
    operator_code: "northwest"

  panhandle_eastern:
    operator_code: "panhandle"

  rover:
    operator_code: "rover"

  southeast_supply:
    operator_code: "southeast-supply"
