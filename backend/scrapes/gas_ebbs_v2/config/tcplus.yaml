source_family: tcplus

defaults:
  base_url: "http://www.tcplus.com"
  # listing_url is not used directly — _get_listing_sources() builds per notice type
  listing_url: "http://www.tcplus.com"
  notice_types:
    - "Critical"
    - "NonCritical"
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
    - "%m/%d/%y"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  gtn:
    path: "gtn"

  great_lakes:
    path: "great%20lakes"

  tuscarora:
    path: "tuscarora"

  north_baja:
    path: "north%20baja"
