source_family: bhegts

defaults:
  notice_subcategories:
    - "Critical"
    - "Non-Critical"
  datetime_formats:
    - "%Y-%m-%dT%H:%M:%S"
    - "%Y-%m-%dT%H:%M:%S.%f"
    - "%Y-%m-%dT%H:%M:%SZ"
    - "%Y-%m-%dT%H:%M:%S.%fZ"
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y"
  # listing_url is not used directly — _get_listing_sources() builds per subcategory
  listing_url: "https://infopost.bhegts.com"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  carolina_gas:
    code: "cgt"
    base_url: "https://infopost.bhegts.com"

  cove_point:
    code: "cpl"
    base_url: "https://infopost.bhegts.com"

  eastern_gas:
    code: "egts"
    base_url: "https://infopost.bhegts.com"
