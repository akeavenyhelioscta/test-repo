source_family: enbridge

defaults:
  base_url: "https://infopost.enbridge.com/infopost"
  # listing_url is not used directly — _get_listing_sources() builds per notice_type
  listing_url: "https://infopost.enbridge.com/infopost"
  notice_types:
    - "CRI"
    - "NON"
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
    - "%m/%d/%y"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  algonquin:
    pipe_code: "AG"

  texas_eastern:
    pipe_code: "TE"

  east_tennessee:
    pipe_code: "ETNG"

  southeast_supply:
    pipe_code: "SESH"

  sabal_trail:
    pipe_code: "STT"

  nexus:
    pipe_code: "NXUS"

  maritimes_northeast:
    pipe_code: "MNUS"

  big_sandy:
    pipe_code: "BSP"

  saltville:
    pipe_code: "SGSC"

  steckman_ridge:
    pipe_code: "SR"

  valley_crossing:
    pipe_code: "VCP"

  bobcat_gas_storage:
    pipe_code: "BGS"

  egan_hub:
    pipe_code: "EHP"

  garden_banks:
    pipe_code: "GB"

  mississippi_canyon:
    pipe_code: "MCGP"

  moss_bluff:
    pipe_code: "MBHP"

  nautilus:
    pipe_code: "NPC"

  tres_palacios:
    pipe_code: "TPGS"
