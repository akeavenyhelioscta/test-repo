source_family: energytransfer

defaults:
  notice_types:
    - "CRI"
    - "NON"
  datetime_formats:
    - "%m/%d/%Y %I:%M:%S %p"
    - "%m/%d/%Y %I:%M %p"
    - "%m/%d/%Y %H:%M:%S"
    - "%m/%d/%Y"
    - "%m/%d/%y"
  # listing_url is not used directly — _get_listing_sources() builds per notice_type
  listing_url: "https://energytransfer.com"
  detail_fetch_limit: 50
  detail_fetch_delay: 0.5
  detail_enabled: true
  archive_html: true

pipelines:
  florida_gas:
    subdomain: "fgttransfer"
    pipe_code: "fgt"

  panhandle_eastern:
    subdomain: "peplmessenger"
    pipe_code: "pepl"

  transwestern:
    subdomain: "twtransfer"
    pipe_code: "tw"

  trunkline_gas:
    subdomain: "tgcmessenger"
    pipe_code: "tgc"

  sea_robin:
    subdomain: "sermessenger"
    pipe_code: "ser"

  tiger:
    subdomain: "tigertransfer"
    pipe_code: "tgr"

  fayetteville_express:
    subdomain: "feptransfer"
    pipe_code: "fep"

  trunkline_lng:
    subdomain: "tlngmessenger"
    pipe_code: "tlng"
    disabled: true
    disabled_reason: "Timeout — not listed on ET informational postings portal, likely decommissioned"

  southwest_gas_storage:
    subdomain: "swgsmessenger"
    pipe_code: "swgs"

  lake_charles_lng:
    subdomain: "lclngmessenger"
    pipe_code: "lclng"
    # May return 0 notices — endpoint exists but notice pages appear empty

  rover:
    subdomain: "rovermessenger"
    pipe_code: "rover"
    # May return 0 notices — endpoint exists but notice pages appear empty

  spc:
    subdomain: "spcmessenger"
    pipe_code: "spc"
    # May return 0 notices — endpoint exists but notice pages appear empty

  gulfstar:
    subdomain: "gstmessenger"
    pipe_code: "gst"
    disabled: true
    disabled_reason: "404 Not Found — endpoint not active"
