version: 2

models:
  - name: source_v1_ercot_da_hrl_lmps
    description: "Normalized ERCOT day-ahead hourly LMPs pivoted to wide format by hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_spp_real_time_15_min
    description: "Normalized ERCOT real-time SPP aggregated from 15-min to hourly, pivoted to wide format by hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_fuel_mix_hourly
    description: "Normalized ERCOT fuel mix aggregated from 5-min to hourly."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_energy_storage_hourly
    description: "Normalized ERCOT energy storage resources aggregated from 5-min to hourly."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_load_hourly
    description: "Normalized ERCOT hourly load by forecast zone with computed total."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_gridstatus_load_forecast_hourly
    description: "Normalized ERCOT load forecast by forecast zone with forecast ranking logic. Complete forecasts only."
    columns:
      - name: rank_forecast_execution_timestamps
        description: "Recency rank of the forecast execution date. 1 = most recent."
      - name: labelled_forecast_execution_timestamp
        description: "Human-readable label: 'Current Forecast', 'Previous Forecast', etc."
      - name: forecast_execution_datetime
        description: "Timestamp when the forecast was published."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_gridstatus_solar_forecast_hourly
    description: "Normalized ERCOT solar forecast by geographic region with forecast ranking logic. 7 regions x 4 metrics + HSL system wide."
    columns:
      - name: rank_forecast_execution_timestamps
        description: "Recency rank of the forecast execution date. 1 = most recent."
      - name: labelled_forecast_execution_timestamp
        description: "Human-readable label: 'Current Forecast', 'Previous Forecast', etc."
      - name: forecast_execution_datetime
        description: "Timestamp when the forecast was published."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_gridstatus_wind_forecast_hourly
    description: "Normalized ERCOT wind forecast by geographic region with forecast ranking logic. 6 regions x 4 metrics + HSL system wide."
    columns:
      - name: rank_forecast_execution_timestamps
        description: "Recency rank of the forecast execution date. 1 = most recent."
      - name: labelled_forecast_execution_timestamp
        description: "Human-readable label: 'Current Forecast', 'Previous Forecast', etc."
      - name: forecast_execution_datetime
        description: "Timestamp when the forecast was published."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_ercot_outages_hourly
    description: "Normalized ERCOT reported outages aggregated to hourly with combined planned/unplanned breakdowns."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
