version: 2

models:

  # ===========================
  # LMPs
  # ===========================

  - name: staging_v1_ercot_lmps_hourly_wide
    description: "Wide-format ERCOT hourly LMPs. DA + RT + DART for 4 hubs × lmp_total only. Used by daily aggregation."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: staging_v1_ercot_lmps_hourly
    description: '{{ doc("ercot_lmps") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "ERCOT pricing hub name."
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']

  - name: staging_v1_ercot_lmps_daily
    description: "Daily ERCOT LMPs by hub with flat/onpeak/offpeak periods. Grain: date."
    columns:
      - name: date
        tests:
          - not_null

  # ===========================
  # Fuel Mix
  # ===========================

  - name: staging_v1_ercot_fuel_mix_hourly
    description: '{{ doc("ercot_fuel_mix") }}'
    columns:
      - name: date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: total
        description: "Total generation (MW)"
      - name: thermal
        description: "Total thermal generation: natural_gas + coal_and_lignite (MW)"
      - name: renewables
        description: "Total renewable generation: wind + solar (MW)"

  - name: staging_v1_ercot_fuel_mix_daily
    description: "Daily ERCOT fuel mix generation by period. Grain: date x period."
    columns:
      - name: date
        tests:
          - not_null
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']

  # ===========================
  # Load
  # ===========================

  - name: staging_v1_ercot_load_daily
    description: "Daily ERCOT load by zone and period. Grain: date x period."
    columns:
      - name: date
        tests:
          - not_null
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']
      - name: load_total
        description: "Total ERCOT load (MW)"

  # ===========================
  # Forecasts
  # ===========================

  - name: staging_v1_ercot_gridstatus_forecasts_hourly
    description: '{{ doc("ercot_forecasts") }}'
    columns:
      - name: rank_forecast_execution_timestamps
        description: "Recency rank of the forecast. 1 = most recent."
        tests:
          - not_null
      - name: forecast_date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: forecast_load_total
        description: "Forecasted total load (MW)"
      - name: forecast_solar_total
        description: "Forecasted total solar generation (MW)"
      - name: forecast_wind_total
        description: "Forecasted total wind generation (MW)"
      - name: forecast_net_load_total
        description: "Forecasted net load: load - solar - wind (MW)"

  - name: staging_v1_ercot_gridstatus_forecasts_daily
    description: "Daily ERCOT combined forecasts by period. Grain: rank x forecast_date x period."
    columns:
      - name: rank_forecast_execution_timestamps
        tests:
          - not_null
      - name: forecast_date
        tests:
          - not_null
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']

  - name: staging_v1_ercot_gridstatus_forecasts_hourly_current
    description: "Hourly ERCOT combined forecasts filtered to current forecast only. Grain: forecast_date x hour_ending."
    columns:
      - name: forecast_date
        tests:
          - not_null
      - name: hour_ending
        tests:
          - not_null
      - name: forecast_load_total
        description: "Forecasted total load (MW)"
      - name: forecast_net_load_total
        description: "Forecasted net load: load - solar - wind (MW)"

  - name: staging_v1_ercot_gridstatus_forecasts_daily_current
    description: "Daily ERCOT combined forecasts filtered to current forecast only. Grain: forecast_date x period."
    columns:
      - name: forecast_date
        tests:
          - not_null
      - name: period
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']
