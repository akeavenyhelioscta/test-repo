version: 2

models:
  - name: ercot_lmps_hourly
    description: '{{ doc("ercot_mart_lmps_hourly") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "ERCOT pricing hub name."
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']

  - name: ercot_lmps_daily
    description: '{{ doc("ercot_mart_lmps_daily") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null

  - name: ercot_fuel_mix_hourly
    description: '{{ doc("ercot_mart_fuel_mix_hourly") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: ercot_fuel_mix_daily
    description: '{{ doc("ercot_mart_fuel_mix_daily") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: period
        description: '{{ doc("col_period") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']

  - name: ercot_load_hourly
    description: '{{ doc("ercot_mart_load_hourly") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: ercot_load_daily
    description: '{{ doc("ercot_mart_load_daily") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: period
        description: '{{ doc("col_period") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']

  - name: ercot_forecasts_hourly
    description: '{{ doc("ercot_mart_forecasts_hourly") }}'
    columns:
      - name: rank_forecast_execution_timestamps
        description: "Recency rank of the forecast. 1 = most recent."
        tests:
          - not_null
      - name: forecast_date
        description: "Target operating date being forecasted."
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: ercot_forecasts_daily
    description: '{{ doc("ercot_mart_forecasts_daily") }}'
    columns:
      - name: rank_forecast_execution_timestamps
        description: "Recency rank of the forecast. 1 = most recent."
        tests:
          - not_null
      - name: forecast_date
        description: "Target operating date being forecasted."
        tests:
          - not_null
      - name: period
        description: '{{ doc("col_period") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']

  - name: ercot_forecasts_hourly_current
    description: '{{ doc("ercot_mart_forecasts_hourly_current") }}'
    columns:
      - name: forecast_date
        description: "Target operating date being forecasted."
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: ercot_forecasts_daily_current
    description: '{{ doc("ercot_mart_forecasts_daily_current") }}'
    columns:
      - name: forecast_date
        description: "Target operating date being forecasted."
        tests:
          - not_null
      - name: period
        description: '{{ doc("col_period") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']

  - name: ercot_outages_hourly
    description: '{{ doc("ercot_mart_outages_hourly") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
