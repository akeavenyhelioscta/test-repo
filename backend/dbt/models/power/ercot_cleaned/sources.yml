version: 2

sources:

  - name: gridstatus_v1
    schema: gridstatus
    description: '{{ doc("ercot_overview") }}'
    tables:
      - name: ercot_lmp_by_settlement_point
        description: "ERCOT day-ahead LMPs by settlement point from GridStatus. Columns: location, location_type, market, lmp."
      - name: ercot_spp_real_time_15_min
        description: "ERCOT real-time 15-minute settlement point prices (SPP) by location from GridStatus."
      - name: ercot_fuel_mix
        description: "ERCOT 5-minute fuel mix generation by fuel type (coal_and_lignite, natural_gas, nuclear, wind, solar, hydro, power_storage, other) from GridStatus."
      - name: ercot_energy_storage_resources
        description: "ERCOT 5-minute energy storage resource data (total_charging, total_discharging, net_output) from GridStatus."
      - name: ercot_load_by_forecast_zone
        description: "ERCOT hourly load by forecast zone (NORTH, SOUTH, WEST, HOUSTON) from GridStatus."
      - name: ercot_load_forecast_by_forecast_zone
        description: "ERCOT 7-day load forecast by forecast zone from GridStatus. Multiple revisions per day with publish timestamps."
      - name: ercot_solar_actual_and_forecast_by_geo_region_hourly
        description: "ERCOT hourly solar actual and forecast by geographic region from GridStatus. Includes generation, COP HSL, STPPF, and PVGRPP metrics."
      - name: ercot_wind_actual_and_forecast_by_geo_region_hourly
        description: "ERCOT hourly wind actual and forecast by geographic region from GridStatus. Includes generation, COP HSL, STWPF, and WGRPP metrics."
      - name: ercot_reported_outages
        description: "ERCOT reported outages (combined, dispatchable, renewable) with planned/unplanned breakdowns from GridStatus."
