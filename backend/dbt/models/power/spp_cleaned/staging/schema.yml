version: 2

models:

  # ===========================
  # LMPs
  # ===========================

  - name: staging_v1_spp_lmps_hourly_wide
    description: "Wide-format SPP hourly LMPs. DA + RT + DART for 2 hubs × 4 price components."
    columns:
      - name: datetime
        description: "Timestamp computed as date + hour_ending interval."
        tests:
          - not_null
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: staging_v1_spp_lmps_hourly
    description: '{{ doc("spp_lmps") }}'
    columns:
      - name: datetime
        description: "Timestamp computed as date + hour_ending interval."
        tests:
          - not_null
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "SPP pricing hub name."
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']
