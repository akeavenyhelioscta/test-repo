version: 2

models:
  - name: source_v1_spp_da_hrl_lmps
    description: "Normalized SPP day-ahead hourly LMPs pivoted to wide format by hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_spp_rt_hrl_lmps
    description: "Normalized SPP real-time hourly LMPs (5-min averaged to hourly) pivoted to wide format by hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
