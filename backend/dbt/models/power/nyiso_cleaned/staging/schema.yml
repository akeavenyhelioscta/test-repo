version: 2

models:

  # ===========================
  # LMPs
  # ===========================

  - name: staging_v1_nyiso_lmps_hourly_wide
    description: "Wide-format NYISO hourly LMPs. DA + RT + DART for 15 zones × 4 price components."
    columns:
      - name: datetime
        description: "EPT timestamp derived from date + hour_ending."
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: staging_v1_nyiso_lmps_hourly
    description: '{{ doc("nyiso_lmps") }}'
    columns:
      - name: datetime
        description: "EPT timestamp derived from date + hour_ending."
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "NYISO pricing zone name."
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']
