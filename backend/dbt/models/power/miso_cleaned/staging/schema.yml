version: 2

models:

  # ===========================
  # LMPs
  # ===========================

  - name: staging_v1_miso_lmps_hourly_wide
    description: "Wide-format MISO hourly LMPs. DA + RT + DART for 8 hubs × 4 price components. Used by daily aggregation."
    columns:
      - name: datetime
        description: '{{ doc("miso_col_datetime") }}'
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: staging_v1_miso_lmps_hourly
    description: '{{ doc("miso_lmps") }}'
    columns:
      - name: datetime
        description: '{{ doc("miso_col_datetime") }}'
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "MISO pricing hub name."
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']

  - name: staging_v1_miso_lmps_daily
    description: "Daily MISO LMPs by period (flat, onpeak, offpeak) in wide format. Grain: date x period."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: period
        description: '{{ doc("col_period") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['flat', 'onpeak', 'offpeak']
