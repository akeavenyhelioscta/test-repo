version: 2

models:
  - name: pjm_modelling_load_forecast_hourly_da_cutoff
    description: >
      PJM load forecast — latest revision issued before 10 AM EPT per
      forecast_date x hour_ending x region (RTO, MIDATL, WEST, SOUTH).
      Bias-safe for training a DA model.
    columns:
      - name: forecast_execution_datetime_utc
        description: "When the load forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the load forecast was issued (local time, see timezone column)."
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
      - name: forecast_execution_date
        description: "Date the load forecast was issued."
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time) — forecast_date + (hour_ending - 1) hours."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: '{{ doc("col_region") }}'
      - name: forecast_load_mw
        description: "Forecasted load (MW) for the region from the latest pre-10 AM EPT revision."

  - name: pjm_modelling_solar_forecast_hourly_da_cutoff
    description: >
      GridStatus PJM solar forecast (front-of-meter + BTM) — latest revision
      issued before 10 AM EPT per forecast_date x hour_ending. Bias-safe for
      training a DA model.
    columns:
      - name: forecast_execution_datetime_utc
        description: "When the solar forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the solar forecast was issued (local time, see timezone column)."
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
      - name: forecast_execution_date
        description: "Date the solar forecast was issued."
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time) — forecast_date + (hour_ending - 1) hours."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: solar_forecast
        description: "Front-of-meter solar forecast (MW)."
      - name: solar_forecast_btm
        description: "Behind-the-meter solar forecast (MW)."

  - name: pjm_modelling_wind_forecast_hourly_da_cutoff
    description: >
      GridStatus PJM wind forecast — latest revision issued before 10 AM EPT
      per forecast_date x hour_ending. Bias-safe for training a DA model.
    columns:
      - name: forecast_execution_datetime_utc
        description: "When the wind forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the wind forecast was issued (local time, see timezone column)."
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
      - name: forecast_execution_date
        description: "Date the wind forecast was issued."
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time) — forecast_date + (hour_ending - 1) hours."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: wind_forecast
        description: "Wind forecast (MW)."

  - name: pjm_modelling_meteo_load_forecast_hourly_da_cutoff
    description: >
      Meteologica PJM load forecast — latest revision issued before 10 AM EPT
      per forecast_date x hour_ending x region (RTO, MIDATL, SOUTH, WEST).
      Bias-safe for training a DA model.
    columns:
      - name: forecast_execution_datetime_utc
        description: "When the load forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the load forecast was issued (local time, see timezone column)."
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
      - name: forecast_execution_date
        description: "Date the load forecast was issued."
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time) — forecast_date + (hour_ending - 1) hours."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: '{{ doc("col_region") }}'
      - name: forecast_load_mw
        description: "Meteologica forecasted load (MW) for the region from the latest pre-10 AM EPT revision."

  - name: pjm_modelling_meteo_solar_forecast_hourly_da_cutoff
    description: >
      Meteologica PJM solar generation forecast — latest revision issued before
      10 AM EPT per forecast_date x hour_ending x region (RTO, MIDATL, SOUTH,
      WEST). Bias-safe for training a DA model.
    columns:
      - name: forecast_execution_datetime_utc
        description: "When the solar forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the solar forecast was issued (local time, see timezone column)."
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
      - name: forecast_execution_date
        description: "Date the solar forecast was issued."
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time) — forecast_date + (hour_ending - 1) hours."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: '{{ doc("col_region") }}'
      - name: forecast_generation_mw
        description: "Meteologica forecasted solar generation (MW) for the region from the latest pre-10 AM EPT revision."

  - name: pjm_modelling_meteo_wind_forecast_hourly_da_cutoff
    description: >
      Meteologica PJM wind generation forecast — latest revision issued before
      10 AM EPT per forecast_date x hour_ending x region (RTO, MIDATL, SOUTH,
      WEST). Bias-safe for training a DA model.
    columns:
      - name: forecast_execution_datetime_utc
        description: "When the wind forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the wind forecast was issued (local time, see timezone column)."
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
      - name: forecast_execution_date
        description: "Date the wind forecast was issued."
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time) — forecast_date + (hour_ending - 1) hours."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: '{{ doc("col_region") }}'
      - name: forecast_generation_mw
        description: "Meteologica forecasted wind generation (MW) for the region from the latest pre-10 AM EPT revision."

  - name: pjm_modelling_meteo_net_load_forecast_hourly_da_cutoff
    description: >
      Meteologica PJM RTO net load forecast (load - solar - wind) — latest
      pre-10 AM EPT revision per forecast_date x hour_ending. Bias-safe for
      training a DA model. Utility-scale only; no BTM.
    columns:
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time)."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: "Always 'RTO' — meteo net load is computed at the RTO level."
      - name: forecast_load_mw
        description: "Meteologica RTO load forecast (MW)."
      - name: solar_forecast_mw
        description: "Meteologica RTO solar generation forecast (MW)."
      - name: wind_forecast_mw
        description: "Meteologica RTO wind generation forecast (MW)."
      - name: net_load_forecast_mw
        description: "Net load forecast (MW) = forecast_load_mw - solar_forecast_mw - wind_forecast_mw."
      - name: load_forecast_execution_datetime_local
        description: "When the load forecast used here was issued (local time)."
      - name: solar_forecast_execution_datetime_local
        description: "When the solar forecast used here was issued (local time)."
      - name: wind_forecast_execution_datetime_local
        description: "When the wind forecast used here was issued (local time)."

  - name: pjm_modelling_net_load_forecast_comparison_da_cutoff
    description: >
      PJM vs Meteologica RTO net-load forecast comparison — aligns the two
      DA-cutoff net-load marts on forecast_date x hour_ending and surfaces
      per-component diffs (meteo minus PJM) for model evaluation.
      FULL OUTER JOIN so rows present in only one source are not silently
      dropped.
    columns:
      - name: forecast_datetime
        description: "Start of the forecasted hour (local time)."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: "Always 'RTO'."

      - name: pjm_forecast_load_mw
        description: "PJM load forecast (MW)."
      - name: pjm_solar_forecast_mw
        description: "GridStatus PJM solar forecast (MW, front-of-meter)."
      - name: pjm_wind_forecast_mw
        description: "GridStatus PJM wind forecast (MW)."
      - name: pjm_net_load_forecast_mw
        description: "PJM-side net load forecast (MW) = pjm load - solar - wind."

      - name: meteo_forecast_load_mw
        description: "Meteologica RTO load forecast (MW)."
      - name: meteo_solar_forecast_mw
        description: "Meteologica RTO solar generation forecast (MW)."
      - name: meteo_wind_forecast_mw
        description: "Meteologica RTO wind generation forecast (MW)."
      - name: meteo_net_load_forecast_mw
        description: "Meteo-side net load forecast (MW) = meteo load - solar - wind."

      - name: load_diff_mw
        description: "meteo_forecast_load_mw - pjm_forecast_load_mw (MW)."
      - name: solar_diff_mw
        description: "meteo_solar_forecast_mw - pjm_solar_forecast_mw (MW)."
      - name: wind_diff_mw
        description: "meteo_wind_forecast_mw - pjm_wind_forecast_mw (MW)."
      - name: net_load_diff_mw
        description: "meteo_net_load_forecast_mw - pjm_net_load_forecast_mw (MW)."

      - name: pjm_load_forecast_execution_datetime_local
        description: "When the PJM load forecast used here was issued (local time)."
      - name: pjm_solar_forecast_execution_datetime_local
        description: "When the GridStatus solar forecast used here was issued (local time)."
      - name: pjm_wind_forecast_execution_datetime_local
        description: "When the GridStatus wind forecast used here was issued (local time)."
      - name: meteo_load_forecast_execution_datetime_local
        description: "When the Meteologica load forecast used here was issued (local time)."
      - name: meteo_solar_forecast_execution_datetime_local
        description: "When the Meteologica solar forecast used here was issued (local time)."
      - name: meteo_wind_forecast_execution_datetime_local
        description: "When the Meteologica wind forecast used here was issued (local time)."
