version: 2

models:
  - name: staging_v1_pjm_load_forecast_da_cutoff
    description: >
      PJM load forecast — latest revision issued before 10 AM EPT per
      forecast_date x hour_ending x region. Bias-safe for training a DA model:
      the forecast information used here was available before DA market close.
    columns:
      - name: forecast_execution_datetime_utc
      - name: timezone
      - name: forecast_execution_datetime_local
      - name: forecast_rank
      - name: forecast_execution_date
      - name: forecast_datetime
      - name: forecast_date
      - name: hour_ending
      - name: region
      - name: forecast_load_mw

