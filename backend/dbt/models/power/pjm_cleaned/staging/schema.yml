version: 2

models:

  # ===========================
  # LMPs
  # ===========================

  - name: staging_v1_pjm_lmps_hourly
    description: '{{ doc("pjm_lmps") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: hub
        description: "Pricing hub name"
      - name: market
        description: '{{ doc("col_market") }}'
      - name: lmp_total
        description: "Total LMP ($/MWh)"
      - name: lmp_system_energy_price
        description: "System energy price component ($/MWh)"
      - name: lmp_congestion_price
        description: "Congestion price component ($/MWh)"
      - name: lmp_marginal_loss_price
        description: "Marginal loss price component ($/MWh)"

  - name: staging_v1_pjm_lmps_rt_hourly
    description: "Hourly real-time LMPs combining verified and unverified sources, preferring verified. Grain: date x hour_ending x hub."
    columns:
      - name: date
      - name: hour_ending
      - name: hub
      - name: rt_lmp_total
        description: "Real-time total LMP ($/MWh)"
      - name: rt_lmp_system_energy_price
        description: "Real-time system energy price ($/MWh)"
      - name: rt_lmp_congestion_price
        description: "Real-time congestion price ($/MWh)"
      - name: rt_lmp_marginal_loss_price
        description: "Real-time marginal loss price ($/MWh)"

  - name: staging_v1_pjm_lmps_daily
    description: "Daily LMPs by hub, period, and market. Grain: date x hub x period x market."
    columns:
      - name: date
      - name: hub
      - name: period
        description: '{{ doc("col_period") }}'
      - name: market
      - name: lmp_total
        description: "Average total LMP for the period ($/MWh)"

  # ===========================
  # Load — Day-Ahead
  # ===========================

  - name: staging_v1_pjm_load_da_hourly
    description: '{{ doc("pjm_load_da") }}'
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
      - name: hour_ending
      - name: region
        description: '{{ doc("col_region") }}'
      - name: da_load_mw
        description: "Day-ahead cleared load (MW)"

  # ===========================
  # Load — Real-Time
  # ===========================

  - name: staging_v1_pjm_load_rt_metered_hourly
    description: '{{ doc("pjm_load_rt") }}'
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
      - name: hour_ending
      - name: region
      - name: rt_load_mw
        description: "Real-time metered load (MW)"

  - name: staging_v1_pjm_load_rt_prelim_hourly
    description: "Hourly real-time preliminary load by region. Same-day with ~1 hour lag. Grain: date x hour_ending x region."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
      - name: hour_ending
      - name: region
      - name: rt_load_mw
        description: "Real-time preliminary load (MW)"

  - name: staging_v1_pjm_load_rt_instantaneous_hourly
    description: "Hourly real-time instantaneous load (5-min averaged to hourly) by region. Near real-time. Grain: date x hour_ending x region."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
      - name: hour_ending
      - name: region
      - name: rt_load_mw
        description: "Real-time instantaneous load, hourly average (MW)"

  # ===========================
  # Load — Forecast
  # ===========================

  - name: staging_v1_pjm_load_forecast_hourly
    description: '{{ doc("pjm_load_forecast") }}'
    columns:
      - name: forecast_rank
        description: '{{ doc("col_forecast_rank") }}'
      - name: forecast_execution_datetime_utc
        description: "When the forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the forecast was issued (local time, see timezone column)."
      - name: forecast_date
        description: "The date being forecasted"
      - name: hour_ending
      - name: region
      - name: forecast_load_mw
        description: "Forecasted load (MW)"

  - name: staging_v1_gridstatus_pjm_load_forecast_hourly
    description: "PJM 7-day hourly load forecast (from GridStatus). Complete forecasts only, ranked by issue time (earliest first). Grain: forecast_rank x forecast_date x hour_ending x region."
    columns:
      - name: forecast_execution_datetime_utc
        description: "When the forecast was issued (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "When the forecast was issued (local time, see timezone column)."
      - name: forecast_rank
      - name: forecast_date
      - name: hour_ending
      - name: region
      - name: forecast_load_mw
        description: "Forecasted load (MW)"

  # ===========================
  # Fuel Mix
  # ===========================

  - name: staging_v1_pjm_fuel_mix_hourly
    description: '{{ doc("pjm_fuel_mix") }}'
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
      - name: hour_ending
      - name: total
        description: "Total generation (MW)"
      - name: thermal
        description: "Total thermal generation (MW)"
      - name: renewables
        description: "Total renewable generation (MW)"

  # ===========================
  # Outages
  # ===========================

  - name: staging_v1_pjm_outages_actual_daily
    description: '{{ doc("pjm_outages") }}'
    columns:
      - name: date
      - name: region
      - name: total_outages_mw
        description: "Total outage MW"
      - name: planned_outages_mw
        description: "Planned outage MW"
      - name: maintenance_outages_mw
        description: "Maintenance outage MW"
      - name: forced_outages_mw
        description: "Forced outage MW"

  - name: staging_v1_pjm_outages_forecast_daily
    description: "PJM 7-day outage forecast by region, ranked by issue time (earliest first). Complete forecasts only. Grain: forecast_rank x forecast_execution_date x forecast_date x region."
    columns:
      - name: forecast_rank
      - name: forecast_execution_date
      - name: forecast_date
      - name: region
      - name: total_outages_mw
        description: "Total forecasted outage MW"

  # ===========================
  # Tie Flows
  # ===========================

  - name: staging_v1_pjm_tie_flows_hourly
    description: '{{ doc("pjm_tie_flows") }}'
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
      - name: hour_ending
      - name: tie_flow_name
        description: "Interface/tie flow name"
      - name: actual_mw
        description: "Actual tie flow (MW)"
      - name: scheduled_mw
        description: "Scheduled tie flow (MW)"

  # ===========================
  # Solar & Wind Forecasts
  # ===========================

  - name: staging_v1_gridstatus_pjm_solar_forecast_hourly
    description: '{{ doc("pjm_solar_wind_forecast") }}'
    columns:
      - name: forecast_rank
      - name: forecast_date
      - name: hour_ending
      - name: solar_forecast
        description: "Front-of-meter solar forecast (MW)"
      - name: solar_forecast_btm
        description: "Behind-the-meter solar forecast (MW)"

  - name: staging_v1_gridstatus_pjm_wind_forecast_hourly
    description: "PJM 2-day hourly wind generation forecast. Complete forecasts only, ranked by issue time (earliest first). Grain: forecast_rank x forecast_date x hour_ending."
    columns:
      - name: forecast_rank
      - name: forecast_date
      - name: hour_ending
      - name: wind_forecast
        description: "Wind generation forecast (MW)"

  # ===========================
  # Ancillary Services
  # ===========================

  - name: staging_v1_pjm_ancillary_services_hourly
    description: '{{ doc("pjm_ancillary_services") }}'
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: sr_price
        description: "MAD Synchronized Reserve clearing price ($/MWh). > $0 = scarcity adder active."
      - name: non_sr_price
        description: "MAD Non-Synchronized Reserve price ($/MWh)."
      - name: secondary_reserve_price
        description: "MAD Secondary Reserve price ($/MWh)."
      - name: regulation_price
        description: "RTO Regulation Capability price ($/MWh)."
      - name: mileage_ratio
        description: "RTO Mileage Ratio (dimensionless)."
      - name: scarcity_adder_active
        description: "TRUE when MAD Synchronized Reserve price > $0, indicating a reserve scarcity adder is active."

  # ===========================
  # Reserves
  # ===========================

  - name: staging_v1_pjm_reserves_hourly
    description: '{{ doc("pjm_reserves") }}'
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: area
        description: "PJM reserve zone (e.g., Mid-Atlantic/Dominion, PJM_RTO)."
      - name: reserve_type
        description: "Reserve product type (Synchronized Reserve, Primary Reserve, etc.)."
      - name: reserve_quantity_mw
        description: "Reserve quantity available (MW)."
      - name: reserve_requirement_mw
        description: "Reserve requirement (MW)."
      - name: market_clearing_price
        description: "Reserve market clearing price ($/MWh)."
      - name: shortage_indicator
        description: "TRUE if shortage pricing was active in any 5-min interval during this hour."
      - name: reserve_margin_mw
        description: "Reserve margin: quantity minus requirement (MW). Negative = deficit."

  # ===========================
  # 5-Min LMPs
  # ===========================

  - name: staging_v1_pjm_lmps_rt_five_min
    description: '{{ doc("pjm_lmps_rt_five_min") }}'
    columns:
      - name: datetime_beginning_utc
        description: "Start of the 5-minute interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the 5-minute interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: hub
        description: "PJM pricing hub name."
      - name: rt_lmp
        description: "5-minute real-time LMP ($/MWh)."
