version: 2

models:
  - name: source_v1_gridstatus_pjm_fuel_mix_hourly
    description: "Normalized GridStatus PJM fuel mix feed at hourly grain."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_gridstatus_pjm_load_forecast
    description: "Normalized GridStatus PJM 7-day load forecast at forecast run x hour x region grain."
    columns:
      - name: forecast_execution_datetime_utc
        description: "Timestamp when the forecast run was published (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "Timestamp when the forecast run was published (local time, see timezone column)."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: '{{ doc("col_region") }}'

  - name: source_v1_gridstatus_pjm_solar_forecast_hourly
    description: "Normalized GridStatus PJM solar forecast, aggregated from 10-minute to hourly."
    columns:
      - name: forecast_execution_datetime_utc
        description: "Timestamp when the forecast run was published (UTC, hour-truncated)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "Timestamp when the forecast run was published (local time, hour-truncated)."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_gridstatus_pjm_wind_forecast_hourly
    description: "Normalized GridStatus PJM wind forecast, aggregated from 10-minute to hourly."
    columns:
      - name: forecast_execution_datetime_utc
        description: "Timestamp when the forecast run was published (UTC, hour-truncated)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "Timestamp when the forecast run was published (local time, hour-truncated)."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_pjm_da_hrl_lmps
    description: "Normalized PJM day-ahead hourly LMPs by hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: hub
        description: "PJM pricing node/hub."

  - name: source_v1_pjm_five_min_load
    description: "Normalized PJM 5-minute instantaneous load with market-region and load-area mappings."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the 5-minute interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the 5-minute interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: mkt_region
        description: "Mapped PJM market region."
      - name: load_area
        description: "Mapped PJM load area."

  - name: source_v1_pjm_five_min_tie_flows
    description: "Normalized PJM 5-minute tie flow measurements by interface."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the 5-minute interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the 5-minute interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: tie_flow_name
        description: "PJM tie flow interface name."

  - name: source_v1_pjm_hrl_dmd_bids
    description: "Normalized PJM day-ahead hourly demand bids by region/load area."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: mkt_region
        description: "Mapped PJM market region."
      - name: load_area
        description: "Mapped PJM load area."

  - name: source_v1_pjm_hrl_load_metered
    description: "Normalized PJM metered hourly load with deduping and regional rollups."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: mkt_region
        description: "PJM market region."
      - name: load_area
        description: "PJM load area."

  - name: source_v1_pjm_hrl_load_prelim
    description: "Normalized PJM preliminary hourly load with derived RTO/WEST/SOUTH regional aggregates."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: mkt_region
        description: "PJM market region."
      - name: load_area
        description: "PJM load area."

  - name: source_v1_pjm_rt_unverified_hrl_lmps
    description: "Normalized PJM real-time unverified hourly LMPs by hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: hub
        description: "PJM pricing node/hub."

  - name: source_v1_pjm_rt_verified_hrl_lmps
    description: "Normalized PJM real-time verified settlement hourly LMPs by hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: hub
        description: "PJM pricing node/hub."

  - name: source_v1_pjm_seven_day_load_forecast
    description: "Normalized PJM API 7-day load forecast by region at hourly grain."
    columns:
      - name: forecast_execution_datetime_utc
        description: "Timestamp when the forecast run was evaluated (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: forecast_execution_datetime_local
        description: "Timestamp when the forecast run was evaluated (local time, see timezone column)."
      - name: forecast_date
        description: "Target operating date being forecasted."
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: region
        description: '{{ doc("col_region") }}'

  - name: source_v1_pjm_seven_day_outage_forecast
    description: "Normalized PJM 7-day outage forecast with mapped region names."
    columns:
      - name: forecast_execution_date
        description: "Date the outage forecast run was produced."
      - name: forecast_date
        description: "Target operating date in the forecast horizon."
      - name: region
        description: "PJM outage forecast region."

  - name: source_v1_pjm_ancillary_services
    description: "Normalized PJM ancillary services prices (SR, non-SR, secondary reserve, regulation, mileage ratio) at hourly grain."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: ancillary_service
        description: "Ancillary service name (e.g., MAD Synchronized Reserve)."

  - name: source_v1_pjm_dispatched_reserves
    description: "Normalized PJM dispatched reserves aggregated to hourly. Includes clearing price, shortage indicator, and requirement vs. quantity."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the hour interval (UTC)."
      - name: datetime_ending_utc
        description: "End of the hour interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the hour interval (local time, see timezone column)."
      - name: datetime_ending_local
        description: "End of the hour interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: area
        description: "PJM reserve zone (e.g., Mid-Atlantic/Dominion, PJM_RTO)."
      - name: reserve_type
        description: "Reserve product type (Synchronized Reserve, Primary Reserve, etc.)."

  - name: source_v1_pjm_unverified_five_min_lmps
    description: "Normalized PJM 5-minute real-time LMPs by hub."
    columns:
      - name: datetime_beginning_utc
        description: "Start of the 5-minute interval (UTC)."
      - name: timezone
        description: "IANA timezone of all local timestamps (e.g., US/Eastern)."
      - name: datetime_beginning_local
        description: "Start of the 5-minute interval (local time, see timezone column)."
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
      - name: hub
        description: "PJM pricing hub name."
