version: 2

exposures:

  - name: pjm_dashboard
    type: dashboard
    description: >
      PJM overview dashboard showing daily LMPs, fuel mix, and outage actuals.
    owner:
      name: "Helios CTA"
      email: "engineering@helioscta.com"
    depends_on:
      - ref('pjm_lmps_daily')
      - ref('pjm_outages_actual_daily')

  - name: pjm_lmps_hourly_page
    type: application
    description: >
      Hourly LMPs detail page showing DA, RT, and DA-RT spread by hub.
      Includes Meteologica DA price forecasts for comparison.
    owner:
      name: "Helios CTA"
      email: "engineering@helioscta.com"
    depends_on:
      - ref('pjm_lmps_hourly')
      - ref('staging_v1_meteologica_pjm_da_price_forecast_hourly')

  - name: pjm_load_forecast_performance
    type: application
    description: >
      Forecast performance page comparing PJM 7-day load forecast against RT metered actuals.
    owner:
      name: "Helios CTA"
      email: "engineering@helioscta.com"
    depends_on:
      - ref('pjm_load_forecast_hourly')
      - ref('pjm_load_rt_prelim_hourly')

  - name: pjm_load_rt_metered_page
    type: application
    description: >
      Real-time metered load page showing hourly actuals by region.
    owner:
      name: "Helios CTA"
      email: "engineering@helioscta.com"
    depends_on:
      - ref('pjm_load_rt_metered_hourly')

  - name: pjm_load_da_page
    type: application
    description: >
      Day-ahead load page showing hourly DA demand bids by region.
    owner:
      name: "Helios CTA"
      email: "engineering@helioscta.com"
    depends_on:
      - ref('pjm_load_da_hourly')

  - name: pjm_load_forecast_page
    type: application
    description: >
      Load forecast page showing PJM and GridStatus 7-day forecasts by region.
    owner:
      name: "Helios CTA"
      email: "engineering@helioscta.com"
    depends_on:
      - ref('pjm_load_forecast_hourly')
      - ref('pjm_gridstatus_load_forecast_hourly')

  - name: pjm_like_day_pipeline
    type: ml
    description: >
      Like-day analysis ML pipeline using historical hourly LMP patterns.
    owner:
      name: "Helios CTA"
      email: "engineering@helioscta.com"
    depends_on:
      - ref('pjm_lmps_hourly')
