version: 2

models:
  - name: staging_v1_caiso_lmps_hourly_wide
    description: "Wide-format CAISO hourly LMPs. DA + RT + DART for 2 hubs × 4 price components. Used by daily aggregation."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: staging_v1_caiso_lmps_hourly
    description: '{{ doc("caiso_lmps") }}'
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "CAISO pricing hub name."
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']

  - name: staging_v1_caiso_lmps_daily
    description: "Daily CAISO LMPs by hub and period. Grain: date."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
