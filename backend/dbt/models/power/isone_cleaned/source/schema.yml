version: 2

models:
  - name: source_v1_isone_da_hrl_lmps
    description: "Normalized ISO-NE day-ahead hourly LMPs filtered to Internal Hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_isone_rt_hrl_lmps_final
    description: "Normalized ISO-NE real-time hourly LMPs (final/verified) filtered to Internal Hub."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'

  - name: source_v1_isone_rt_hrl_lmps_prelim
    description: "Normalized ISO-NE real-time hourly LMPs (preliminary) filtered to Internal Hub. Last 10 days only."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
