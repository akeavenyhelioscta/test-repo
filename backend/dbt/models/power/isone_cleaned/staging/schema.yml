version: 2

models:

  # ===========================
  # LMPs
  # ===========================

  - name: staging_v1_isone_rt_hrl_lmps
    description: "Combined ISO-NE RT LMPs (final + prelim). Final takes precedence."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: staging_v1_isone_lmps_hourly_wide
    description: "Wide-format ISO-NE hourly LMPs. DA + RT + DART for 1 hub x 4 price components."
    columns:
      - name: datetime
        description: "Timestamp computed as date + hour_ending interval."
        tests:
          - not_null
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null

  - name: staging_v1_isone_lmps_hourly
    description: '{{ doc("isone_lmps") }}'
    columns:
      - name: datetime
        description: "Timestamp computed as date + hour_ending interval."
        tests:
          - not_null
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("col_hour_ending") }}'
        tests:
          - not_null
      - name: hub
        description: "ISO-NE pricing hub name."
        tests:
          - not_null
      - name: market
        description: '{{ doc("col_market") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['da', 'rt', 'dart']

  - name: staging_v1_isone_lmps_daily
    description: "Daily ISO-NE LMPs in wide format with flat/onpeak/offpeak periods. Grain: date."
    columns:
      - name: date
        description: '{{ doc("col_date") }}'
        tests:
          - not_null
