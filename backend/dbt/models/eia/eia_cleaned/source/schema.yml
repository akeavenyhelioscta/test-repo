version: 2

models:
  - name: source_v1_eia_930_fuel_type_hrl_gen
    description: "Raw EIA-930 hourly generation by fuel type, extracted from the eia schema with explicit casts."
    columns:
      - name: datetime_utc
        description: '{{ doc("eia_col_datetime_utc") }}'
        tests:
          - not_null
      - name: date
        description: "UTC date of the observation."
        tests:
          - not_null
      - name: hour
        description: "UTC hour of the observation (0–23)."
        tests:
          - not_null
      - name: respondent
        description: "EIA balancing authority code as reported (before normalization)."
        tests:
          - not_null
      - name: battery_storage
        description: "Battery storage generation (MW)."
      - name: coal
        description: "Coal generation (MW)."
      - name: geothermal
        description: "Geothermal generation (MW)."
      - name: hydro
        description: "Hydroelectric generation (MW)."
      - name: natural_gas
        description: "Natural gas generation (MW)."
      - name: nuclear
        description: "Nuclear generation (MW)."
      - name: other
        description: "Other fuel type generation (MW)."
      - name: other_energy_storage
        description: "Other energy storage generation (MW)."
      - name: petroleum
        description: "Petroleum generation (MW)."
      - name: pumped_storage
        description: "Pumped-storage hydroelectric generation (MW)."
      - name: solar
        description: "Solar generation (MW)."
      - name: solar_with_integrated_battery_storage
        description: "Solar with integrated battery storage generation (MW)."
      - name: unknown
        description: "Unknown fuel type generation (MW)."
      - name: unknown_energy_storage
        description: "Unknown energy storage generation (MW)."
      - name: wind
        description: "Wind generation (MW)."
      - name: wind_with_integrated_battery_storage
        description: "Wind with integrated battery storage generation (MW)."

  - name: source_v1_eia_nat_gas_consumption_end_use
    description: '{{ doc("eia_nat_gas_consumption_end_use_source_model") }}'
    columns:
      - name: period
        description: '{{ doc("eia_ng_col_period") }}'
        tests:
          - not_null
      - name: area_name
        description: '{{ doc("eia_ng_col_area_name") }}'
        tests:
          - not_null
      - name: process_name
        description: '{{ doc("eia_ng_col_process_name") }}'
        tests:
          - not_null
      - name: units
        description: '{{ doc("eia_ng_col_consumption_unit") }}'
        tests:
          - not_null
      - name: value
        description: '{{ doc("eia_ng_col_consumption") }}'
