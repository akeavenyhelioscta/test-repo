version: 2

models:
  - name: utils_v1_positions_and_trades_accounts_lookup
    description: >
      Maps internal account names (ACIM, ANDY, MAC, PNT, DICKSON, TITAN) to
      external account identifiers across Marex Position File, Marex Allocated
      Trades, NAV Position File, and Clear Street Trades sources.
    columns:
      - name: account_name
        description: Internal account name (ACIM, ANDY, MAC, PNT, DICKSON, TITAN)
      - name: account
        description: External account identifier used by the source system
      - name: source
        description: >
          Source file type where this account identifier appears
          (Marex Position File, Marex Allocated Trades, NAV Position File, Clear Street Trades)

  - name: utils_v1_positions_and_trades_product_lookup
    description: >
      Maps exchange codes to product groupings, regional classifications, and
      source-specific product descriptions (NAV and Marex). Covers gas (BALMO,
      futures, options, cal spreads), power (PJM, ERCOT, NEPOOL, CAISO, PAC NW),
      and basis products. Also provides Bloomberg exchange codes and underlying
      exchange codes for options.
    columns:
      - name: bbg_exchange_code
        description: Bloomberg exchange code (NG, ZA, NGW). NULL for ICE-only products.
      - name: exchange_code
        description: Internal exchange code (HHD, NG, HH, HP, PMI, etc.)
      - name: exchange_code_underlying
        description: Underlying exchange code for options (NG for gas options, PMI for power options). NULL for futures.
      - name: exchange_code_grouping
        description: Product grouping category (BALMO, GAS_FUTURES, GAS_OPTIONS, POWER_FUTURES, POWER_OPTIONS, SHORT_TERM_POWER, BASIS)
      - name: exchange_code_region
        description: Regional classification (HENRY_HUB, PJM, ERCOT, NEPOOL, CAISO, PAC_NW, BASIS)
      - name: nav_product
        description: NAV source product description string. NULL when no NAV mapping exists.
      - name: marex_product
        description: Marex source product description string.

  - name: utils_v1_positions_and_trades_traders_lookup
    description: >
      Maps trader identifiers to internal trader names.
    columns:
      - name: trader
        description: External trader identifier (CME_KSAXENA4, ksaxena6, elacic2)
      - name: trader_name
        description: Internal trader name (KAPIL, EDI)
