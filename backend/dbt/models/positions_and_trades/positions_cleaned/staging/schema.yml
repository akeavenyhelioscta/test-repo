version: 2

models:
  - name: staging_v5_nav_positions_1_combined
    description: "Unioned NAV positions across AGR, MOROSS, PNT, and TITAN feeds."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
        tests:
          - not_null
      - name: nav_reference_number
        description: '{{ doc("positions_col_reference_number") }}'
      - name: account
        description: '{{ doc("positions_col_account") }}'
      - name: contract_yyyymm
        description: '{{ doc("positions_col_contract_yyyymm") }}'
      - name: buy_sell
        description: '{{ doc("positions_col_buy_sell") }}'
        tests:
          - accepted_values:
              values: ['B', 'S']

  - name: staging_v5_nav_positions_2_product_lookup
    description: "NAV positions enriched with product lookup metadata and normalized descriptions."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
      - name: nav_reference_number
        description: '{{ doc("positions_col_reference_number") }}'
      - name: exchange_code
        description: '{{ doc("positions_col_exchange_code") }}'
      - name: nav_product
        description: '{{ doc("positions_col_nav_product") }}'
      - name: marex_description
        description: '{{ doc("positions_col_marex_description") }}'
      - name: nav_row_number
        description: "Deduplication order within NAV key partition by latest upload timestamp."

  - name: staging_v5_nav_positions
    description: "Final NAV staging output used in Marex+NAV combined staging models."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
      - name: nav_reference_number
        description: '{{ doc("positions_col_reference_number") }}'
      - name: account
        description: '{{ doc("positions_col_account") }}'
      - name: exchange_code
        description: '{{ doc("positions_col_exchange_code") }}'
      - name: marex_description
        description: '{{ doc("positions_col_marex_description") }}'
      - name: qty
        description: '{{ doc("positions_col_qty") }}'

  - name: staging_v5_marex_and_nav_positions_1_combined
    description: "Combined Marex and NAV positions with a normalized shared column set."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
        tests:
          - not_null
      - name: source_table
        description: '{{ doc("positions_col_source_table") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['MAREX', 'NAV']
      - name: reference_number
        description: '{{ doc("positions_col_reference_number") }}'
      - name: account
        description: '{{ doc("positions_col_account") }}'
      - name: exchange_code
        description: '{{ doc("positions_col_exchange_code") }}'
      - name: qty
        description: '{{ doc("positions_col_qty") }}'
      - name: lots
        description: '{{ doc("positions_col_lots") }}'

  - name: staging_v5_marex_and_nav_positions_2_forward_fill
    description: "Combined positions with forward-filled sparse fields (last trade date and Marex delta)."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
      - name: source_table
        description: '{{ doc("positions_col_source_table") }}'
      - name: ignore_nulls_ordering
        description: "Window grouping key used to emulate IGNORE NULLS in PostgreSQL."
      - name: last_trade_date_filled
        description: '{{ doc("positions_col_last_trade_date_filled") }}'
      - name: marex_delta_filled
        description: '{{ doc("positions_col_marex_delta") }}'

  - name: staging_v5_marex_and_nav_positions_3_add_cols
    description: "Combined positions with account labels, expiry metrics, gas normalization, and futures month codes."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
      - name: account_name
        description: '{{ doc("positions_col_account_name") }}'
      - name: days_to_expiry
        description: '{{ doc("positions_col_days_to_expiry") }}'
      - name: gas_qty
        description: '{{ doc("positions_col_gas_qty") }}'
      - name: gas_lots
        description: '{{ doc("positions_col_gas_lots") }}'
      - name: futures_contract_month
        description: '{{ doc("positions_col_futures_contract_month") }}'
      - name: futures_contract_month_y
        description: '{{ doc("positions_col_futures_contract_month_y") }}'
      - name: futures_contract_month_yy
        description: '{{ doc("positions_col_futures_contract_month_yy") }}'

  - name: staging_v5_marex_and_nav_positions_4_exchange_codes
    description: "Combined positions with product grouping, regional mappings, and external symbol generation."
    columns:
      - name: exchange_code_grouping
        description: '{{ doc("positions_col_exchange_code_grouping") }}'
      - name: exchange_code_region
        description: '{{ doc("positions_col_exchange_code_region") }}'
      - name: exchange_code_underlying
        description: '{{ doc("positions_col_exchange_code_underlying") }}'
      - name: ice_xl_symbol
        description: '{{ doc("positions_col_ice_xl_symbol") }}'
      - name: ice_xl_symbol_underlying
        description: '{{ doc("positions_col_ice_xl_symbol_underlying") }}'
      - name: cme_excel_symbol
        description: '{{ doc("positions_col_cme_excel_symbol") }}'
      - name: bbg_symbol
        description: '{{ doc("positions_col_bbg_symbol") }}'
      - name: bbg_option_description
        description: '{{ doc("positions_col_bbg_option_description") }}'

  - name: staging_v5_marex_and_nav_positions
    description: "Final non-persisted staging output used by downstream mart grouping models."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
      - name: source_table
        description: '{{ doc("positions_col_source_table") }}'
        tests:
          - accepted_values:
              values: ['MAREX', 'NAV']
      - name: reference_number
        description: '{{ doc("positions_col_reference_number") }}'
      - name: exchange_code
        description: '{{ doc("positions_col_exchange_code") }}'
      - name: qty
        description: '{{ doc("positions_col_qty") }}'
      - name: lots
        description: '{{ doc("positions_col_lots") }}'
