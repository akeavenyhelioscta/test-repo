version: 2

models:
  - name: source_v5_marex_positions
    description: "Normalized Marex position snapshot at row-level contract grain."
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
        tests:
          - not_null
      - name: sftp_upload_timestamp
        description: '{{ doc("positions_col_sftp_upload_timestamp") }}'
        tests:
          - not_null
      - name: marex_reference_number
        description: '{{ doc("positions_col_reference_number") }}'
      - name: account
        description: '{{ doc("positions_col_account") }}'
      - name: exchange_name
        description: '{{ doc("positions_col_exchange_name") }}'
      - name: exchange_code
        description: '{{ doc("positions_col_exchange_code") }}'
      - name: is_option
        description: '{{ doc("positions_col_is_option") }}'
      - name: put_call
        description: '{{ doc("positions_col_put_call") }}'
      - name: strike_price
        description: '{{ doc("positions_col_strike_price") }}'
      - name: contract_yyyymm
        description: '{{ doc("positions_col_contract_yyyymm") }}'
      - name: buy_sell
        description: '{{ doc("positions_col_buy_sell") }}'
        tests:
          - accepted_values:
              values: ['B', 'S']
      - name: qty
        description: '{{ doc("positions_col_qty") }}'
      - name: settlement_price
        description: '{{ doc("positions_col_settlement_price") }}'
      - name: market_value
        description: '{{ doc("positions_col_market_value") }}'

