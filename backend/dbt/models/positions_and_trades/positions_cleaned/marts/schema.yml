version: 2

models:
  - name: marts_v5_marex_and_nav_positions_grouped
    description: '{{ doc("positions_mart_grouped") }}'
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
        tests:
          - not_null
      - name: exchange_code_grouping
        description: '{{ doc("positions_col_exchange_code_grouping") }}'
        tests:
          - not_null
      - name: exchange_code
        description: '{{ doc("positions_col_exchange_code") }}'
        tests:
          - not_null
      - name: is_option
        description: '{{ doc("positions_col_is_option") }}'
      - name: put_call
        description: '{{ doc("positions_col_put_call") }}'
      - name: strike_price
        description: '{{ doc("positions_col_strike_price") }}'
      - name: contract_yyyymm
        description: '{{ doc("positions_col_contract_yyyymm") }}'
        tests:
          - not_null
      - name: marex_description
        description: '{{ doc("positions_col_marex_description") }}'
      - name: lots
        description: '{{ doc("positions_col_lots") }}'
      - name: qty_total
        description: "Total summed quantity across all mapped accounts for the grouped grain."
      - name: qty_acim
        description: "Summed quantity for ACIM account."
      - name: qty_andy
        description: "Summed quantity for ANDY account."
      - name: qty_mac
        description: "Summed quantity for MAC account."
      - name: qty_pnt
        description: "Summed quantity for PNT account."
      - name: qty_dickson
        description: "Summed quantity for DICKSON account."
      - name: qty_titan
        description: "Summed quantity for TITAN account."
      - name: market_value_total
        description: "Summed market value at grouped grain."
      - name: settlement_price_total
        description: "Average settlement price at grouped grain."
      - name: trade_price_total
        description: "Average trade price at grouped grain."

  - name: marts_v5_marex_and_nav_positions_grouped_latest
    description: '{{ doc("positions_mart_grouped_latest") }}'
    columns:
      - name: sftp_date
        description: '{{ doc("positions_col_sftp_date") }}'
        tests:
          - not_null
      - name: previous_sftp_date
        description: '{{ doc("positions_col_previous_sftp_date") }}'
      - name: exchange_code
        description: '{{ doc("positions_col_exchange_code") }}'
        tests:
          - not_null
      - name: contract_yyyymm
        description: '{{ doc("positions_col_contract_yyyymm") }}'
      - name: previous_marex_delta
        description: '{{ doc("positions_col_previous_marex_delta") }}'
      - name: daily_change_total
        description: '{{ doc("positions_col_daily_change_total") }}'
      - name: daily_pnl_total
        description: '{{ doc("positions_col_daily_pnl_total") }}'
      - name: qty_total
        description: "Current-day grouped quantity total."
      - name: previous_qty_total
        description: "Prior-day grouped quantity total."
      - name: dod_qty_total
        description: "Day-over-day grouped quantity change."
