version: 2

models:
  - name: source_v2_clear_street_trades
    description: "Normalized end-of-day Clear Street trade feed with typed columns and latest-upload filtering."
    columns:
      - name: sftp_date
        description: '{{ doc("trades_col_sftp_date") }}'
        tests:
          - not_null
      - name: sftp_upload_timestamp
        description: '{{ doc("trades_col_sftp_upload_timestamp") }}'
        tests:
          - not_null
      - name: trade_date
        description: '{{ doc("trades_col_trade_date") }}'
        tests:
          - not_null
      - name: account_number
        description: '{{ doc("trades_col_account") }}'
      - name: give_in_out_firm_num
        description: "Executing/clearing firm account identifier used for account mapping."
      - name: exchange_name
        description: '{{ doc("trades_col_exchange_name") }}'
      - name: exch_comm_cd
        description: '{{ doc("trades_col_exch_comm_cd") }}'
      - name: contract_year_month
        description: '{{ doc("trades_col_contract_yyyymm") }}'
      - name: prompt_day
        description: '{{ doc("trades_col_contract_day") }}'
      - name: put_call
        description: '{{ doc("trades_col_put_call") }}'
      - name: strike_price
        description: '{{ doc("trades_col_strike_price") }}'
      - name: buy_sell
        description: '{{ doc("trades_col_buy_sell") }}'
      - name: quantity
        description: '{{ doc("trades_col_qty") }}'
      - name: trade_price
        description: '{{ doc("trades_col_trade_price") }}'
      - name: settlement_price
        description: '{{ doc("trades_col_settlement_price") }}'

  - name: source_v2_clear_street_intraday_trades
    description: "Normalized intraday Clear Street trade feed with typed columns and latest-upload filtering."
    columns:
      - name: sftp_date
        description: '{{ doc("trades_col_sftp_date") }}'
        tests:
          - not_null
      - name: sftp_upload_timestamp
        description: '{{ doc("trades_col_sftp_upload_timestamp") }}'
        tests:
          - not_null
      - name: trade_date
        description: '{{ doc("trades_col_trade_date") }}'
        tests:
          - not_null
      - name: account
        description: '{{ doc("trades_col_account") }}'
      - name: gi_firm
        description: "Executing/clearing firm account identifier used for account mapping."
      - name: exchange_name_3dig
        description: '{{ doc("trades_col_exchange_name") }}'
      - name: exch_comm_cd
        description: '{{ doc("trades_col_exch_comm_cd") }}'
      - name: contract_year_month
        description: '{{ doc("trades_col_contract_yyyymm") }}'
      - name: contract_year
        description: '{{ doc("trades_col_contract_year") }}'
      - name: contract_month
        description: '{{ doc("trades_col_contract_month") }}'
      - name: contract_day
        description: '{{ doc("trades_col_contract_day") }}'
      - name: put_call
        description: '{{ doc("trades_col_put_call") }}'
      - name: b_s
        description: '{{ doc("trades_col_buy_sell") }}'
      - name: qty
        description: '{{ doc("trades_col_qty") }}'
      - name: trade_price
        description: '{{ doc("trades_col_trade_price") }}'

  - name: source_v2_marex_allocated_trades
    description: "Normalized Marex allocated trades feed with latest-upload filtering and typed contract fields."
    columns:
      - name: sftp_date
        description: '{{ doc("trades_col_sftp_date") }}'
        tests:
          - not_null
      - name: sftp_upload_timestamp
        description: '{{ doc("trades_col_sftp_upload_timestamp") }}'
        tests:
          - not_null
      - name: clear_date
        description: '{{ doc("trades_col_clear_date") }}'
      - name: account
        description: '{{ doc("trades_col_account") }}'
      - name: trader
        description: "Trader identifier from Marex file."
      - name: exchange_name
        description: '{{ doc("trades_col_exchange_name") }}'
      - name: exchange_code
        description: '{{ doc("trades_col_exchange_code") }}'
      - name: put_call
        description: '{{ doc("trades_col_put_call") }}'
      - name: strike_price
        description: '{{ doc("trades_col_strike_price") }}'
      - name: contract_yyyymm
        description: '{{ doc("trades_col_contract_yyyymm") }}'
      - name: buy_sell
        description: '{{ doc("trades_col_buy_sell") }}'
        tests:
          - accepted_values:
              values: ['B', 'S']
      - name: qty
        description: '{{ doc("trades_col_qty") }}'
      - name: trade_price
        description: '{{ doc("trades_col_trade_price") }}'
