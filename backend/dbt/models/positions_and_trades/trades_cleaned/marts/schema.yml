version: 2

models:
  - name: marts_v2_clear_street_trades
    description: "Consumer-facing daily Clear Street trade view enriched with product and account mappings."
    columns:
      - name: sftp_date
        description: '{{ doc("trades_col_sftp_date") }}'
        tests:
          - not_null
      - name: sftp_upload_timestamp
        description: '{{ doc("trades_col_sftp_upload_timestamp") }}'
      - name: trade_date
        description: '{{ doc("trades_col_trade_date") }}'
        tests:
          - not_null
      - name: account_name
        description: '{{ doc("trades_col_account_name") }}'
