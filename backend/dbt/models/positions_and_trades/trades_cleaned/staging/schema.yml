version: 2

models:
  - name: staging_v2_clear_street_trades_1_additional_cols
    description: "Clear Street daily trades with derived side/quantity, contract components, and account mapping fields."
    columns:
      - name: sftp_date
        description: '{{ doc("trades_col_sftp_date") }}'
      - name: trade_date
        description: '{{ doc("trades_col_trade_date") }}'
      - name: trade_status
        description: '{{ doc("trades_col_trade_status") }}'
      - name: exchange_name_cleaned
        description: '{{ doc("trades_col_exchange_name") }}'
      - name: buy_sell_cleaned
        description: '{{ doc("trades_col_buy_sell") }}'
        tests:
          - accepted_values:
              values: ['B', 'S']
      - name: quantity_cleaned
        description: '{{ doc("trades_col_qty") }}'
      - name: account_number_cleaned
        description: '{{ doc("trades_col_clear_street_account") }}'
      - name: account_name
        description: '{{ doc("trades_col_account_name") }}'
      - name: contract_year
        description: '{{ doc("trades_col_contract_year") }}'
      - name: contract_month
        description: '{{ doc("trades_col_contract_month") }}'
      - name: contract_day
        description: '{{ doc("trades_col_contract_day") }}'

