version: 2

models:
  - name: utils_v1_dates_daily
    description: '{{ doc("utils_overview") }}'
    columns:
      - name: date
        description: '{{ doc("utils_col_date") }}'
        tests:
          - not_null
          - unique
      - name: year
        description: '{{ doc("utils_col_year") }}'
        tests:
          - not_null
      - name: year_month
        description: '{{ doc("utils_col_year_month") }}'
        tests:
          - not_null
      - name: summer_winter
        description: '{{ doc("utils_col_summer_winter") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['SUMMER', 'WINTER']
      - name: summer_winter_yyyy
        description: '{{ doc("utils_col_summer_winter_yyyy") }}'
        tests:
          - not_null
      - name: month
        description: '{{ doc("utils_col_month") }}'
        tests:
          - not_null
      - name: mm_dd
        description: '{{ doc("utils_col_mm_dd") }}'
        tests:
          - not_null
      - name: mm_dd_cy
        description: '{{ doc("utils_col_mm_dd_cy") }}'
        tests:
          - not_null
      - name: eia_storage_week
        description: '{{ doc("utils_col_eia_storage_week") }}'
        tests:
          - not_null
      - name: eia_storage_week_number
        description: '{{ doc("utils_col_eia_storage_week_number") }}'
        tests:
          - not_null
      - name: day_of_week
        description: '{{ doc("utils_col_day_of_week") }}'
        tests:
          - not_null
      - name: day_of_week_number
        description: '{{ doc("utils_col_day_of_week_number") }}'
        tests:
          - not_null
      - name: is_weekend
        description: '{{ doc("utils_col_is_weekend") }}'
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: is_nerc_holiday
        description: '{{ doc("utils_col_is_nerc_holiday") }}'
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: utils_v1_dates_weekly
    description: '{{ doc("utils_overview") }}'
    columns:
      - name: eia_storage_week
        description: '{{ doc("utils_col_eia_storage_week") }}'
        tests:
          - not_null
          - unique
      - name: eia_storage_week_number
        description: '{{ doc("utils_col_eia_storage_week_number") }}'
        tests:
          - not_null
      - name: year
        description: '{{ doc("utils_col_year") }}'
        tests:
          - not_null
      - name: year_month
        description: '{{ doc("utils_col_year_month") }}'
        tests:
          - not_null
      - name: summer_winter
        description: '{{ doc("utils_col_summer_winter") }}'
        tests:
          - not_null
          - accepted_values:
              values: ['SUMMER', 'WINTER']
      - name: summer_winter_yyyy
        description: '{{ doc("utils_col_summer_winter_yyyy") }}'
        tests:
          - not_null
      - name: month
        description: '{{ doc("utils_col_month") }}'
        tests:
          - not_null
      - name: is_nerc_holiday
        description: '{{ doc("utils_col_is_nerc_holiday") }}'
        tests:
          - not_null

  - name: utils_v1_nerc_holidays
    description: 'Static lookup of NERC holidays from 2014 through 2028. Six holidays per year: New Year''s Day, Memorial Day, Independence Day, Labor Day, Thanksgiving, and Christmas.'
    columns:
      - name: nerc_holiday
        description: '{{ doc("utils_col_nerc_holiday") }}'
        tests:
          - not_null
          - unique
