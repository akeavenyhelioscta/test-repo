version: 2

models:
  - name: genscape_gas_production_forecast_weekly
    description: '{{ doc("genscape_gas_production_forecast_weekly_mart") }}'
    columns:
      - name: year
        description: "Forecast target year"
        tests:
          - not_null
      - name: month
        description: "Forecast target month (1-12)"
        tests:
          - not_null
      - name: date
        description: '{{ doc("genscape_col_date") }}'
        tests:
          - not_null
      - name: report_date
        description: '{{ doc("genscape_col_report_date") }}'
        tests:
          - not_null
      - name: revision
        description: '{{ doc("genscape_col_revision") }}'
        tests:
          - not_null
      - name: max_revision
        description: "Total number of forecast revisions available for this date (weekly cadence)"
        tests:
          - not_null
      - name: lower_48_production
        description: '{{ doc("genscape_col_production") }}'
      - name: lower_48_dry_gas_production_yoy
        description: '{{ doc("genscape_col_dry_gas_production_yoy") }}'
      - name: lower_48_oil_rig_count
        description: '{{ doc("genscape_col_oil_rig_count") }}'
      - name: lower_48_gas_rig_count
        description: '{{ doc("genscape_col_gas_rig_count") }}'

  - name: genscape_gas_production_forecast_monthly
    description: '{{ doc("genscape_gas_production_forecast_monthly_mart") }}'
    columns:
      - name: year
        description: "Forecast target year"
        tests:
          - not_null
      - name: month
        description: "Forecast target month (1-12)"
        tests:
          - not_null
      - name: date
        description: '{{ doc("genscape_col_date") }}'
        tests:
          - not_null
      - name: report_date
        description: '{{ doc("genscape_col_report_date") }}'
        tests:
          - not_null
      - name: revision
        description: '{{ doc("genscape_col_revision") }}'
        tests:
          - not_null
      - name: max_revision
        description: "Total number of forecast revisions available for this date (monthly cadence only)"
        tests:
          - not_null
      - name: lower_48_production
        description: '{{ doc("genscape_col_production") }}'
      - name: lower_48_dry_gas_production_yoy
        description: '{{ doc("genscape_col_dry_gas_production_yoy") }}'
      - name: lower_48_oil_rig_count
        description: '{{ doc("genscape_col_oil_rig_count") }}'
      - name: lower_48_gas_rig_count
        description: '{{ doc("genscape_col_gas_rig_count") }}'

  - name: genscape_daily_pipeline_production
    description: '{{ doc("genscape_daily_pipeline_production_mart") }}'
    columns:
      - name: date
        description: '{{ doc("genscape_dpp_col_date") }}'
        tests:
          - not_null
      - name: report_date
        description: '{{ doc("genscape_col_report_date") }}'
        tests:
          - not_null
      - name: revision
        description: '{{ doc("genscape_col_revision") }}'
        tests:
          - not_null
      - name: max_revision
        description: "Total number of report revisions available for this production date"
        tests:
          - not_null
      - name: lower_48
        description: '{{ doc("genscape_dpp_col_lower_48") }}'
      - name: gulf_of_mexico
        description: '{{ doc("genscape_dpp_col_gulf_of_mexico") }}'
      - name: gulf_coast
        description: "Composite: north_louisiana + south_louisiana + other_gulf_coast (MMCF/d)"
      - name: texas
        description: '{{ doc("genscape_dpp_col_texas") }}'
      - name: mid_con
        description: "Composite: oklahoma + kansas + arkansas (MMCF/d)"
      - name: permian
        description: "Composite: permian_new_mexico + permian_texas (MMCF/d)"
      - name: san_juan
        description: '{{ doc("genscape_dpp_col_san_juan") }}'
      - name: rockies
        description: "Composite: 7 sub-basin columns (MMCF/d)"
      - name: west
        description: '{{ doc("genscape_dpp_col_west") }}'
      - name: east
        description: "Composite: ohio + southwest_pennsylvania + northeast_pennsylvania + west_virginia + other_east (MMCF/d)"
      - name: western_canada
        description: '{{ doc("genscape_dpp_col_western_canada") }}'
      - name: permian_flare_counts
        description: "Count of observed flaring events in the Permian Basin"
      - name: permian_flare_volume
        description: "Estimated flaring volume in the Permian Basin (MMCF/d)"

  - name: genscape_daily_power_estimate
    description: '{{ doc("genscape_daily_power_estimate_mart") }}'
    columns:
      - name: gas_day
        description: '{{ doc("genscape_dpe_col_gasday") }}'
        tests:
          - not_null
      - name: power_burn_variable
        description: '{{ doc("genscape_dpe_col_power_burn_variable") }}'
        tests:
          - not_null
      - name: model_type_based_on_noms
        description: '{{ doc("genscape_dpe_col_modeltype") }}'
        tests:
          - not_null
      - name: max_model_type_based_on_noms
        description: "Maximum model type across all model types for the same gasday and power_burn_variable"
      - name: conus
        description: "Power burn estimate for CONUS region"
      - name: east
        description: "Power burn estimate for East region"
      - name: midwest
        description: "Power burn estimate for Midwest region"
      - name: mountain
        description: "Power burn estimate for Mountain region"
      - name: pacific
        description: "Power burn estimate for Pacific region"
      - name: south_central
        description: "Power burn estimate for South Central region"
