version: 2

models:
  - name: staging_v2_genscape_gas_production_forecast
    description: '{{ doc("genscape_gas_production_forecast") }}'
    columns:
      - name: year
        description: "Forecast target year"
        tests:
          - not_null
      - name: month
        description: "Forecast target month (1-12)"
        tests:
          - not_null
      - name: date
        description: '{{ doc("genscape_col_date") }}'
        tests:
          - not_null
      - name: report_date
        description: '{{ doc("genscape_col_report_date") }}'
        tests:
          - not_null
      - name: revision
        description: '{{ doc("genscape_col_revision") }}'
        tests:
          - not_null
      - name: max_revision
        description: "Total number of forecast revisions available for this date"
        tests:
          - not_null
      - name: lower_48_production
        description: '{{ doc("genscape_col_production") }}'
      - name: lower_48_dry_gas_production_yoy
        description: '{{ doc("genscape_col_dry_gas_production_yoy") }}'
      - name: lower_48_oil_rig_count
        description: '{{ doc("genscape_col_oil_rig_count") }}'
      - name: lower_48_gas_rig_count
        description: '{{ doc("genscape_col_gas_rig_count") }}'

  - name: staging_v2_daily_pipeline_production
    description: '{{ doc("genscape_daily_pipeline_production_staging") }}'
    columns:
      - name: date
        description: '{{ doc("genscape_dpp_col_date") }}'
        tests:
          - not_null
      - name: report_date
        description: '{{ doc("genscape_col_report_date") }}'
        tests:
          - not_null
      - name: revision
        description: '{{ doc("genscape_col_revision") }}'
        tests:
          - not_null
      - name: max_revision
        description: "Total number of report revisions available for this production date"
        tests:
          - not_null
      - name: lower_48
        description: '{{ doc("genscape_dpp_col_lower_48") }}'
      - name: gulf_of_mexico
        description: '{{ doc("genscape_dpp_col_gulf_of_mexico") }}'
      - name: gulf_coast
        description: "Composite: north_louisiana + south_louisiana + other_gulf_coast (MMCF/d)"
      - name: north_louisiana
        description: "Daily dry gas production in North Louisiana (MMCF/d)"
      - name: south_louisiana
        description: "Daily dry gas production in South Louisiana (MMCF/d)"
      - name: other_gulf_coast
        description: "Daily dry gas production in Other Gulf Coast regions (MMCF/d)"
      - name: texas
        description: '{{ doc("genscape_dpp_col_texas") }}'
      - name: east_texas
        description: "Daily dry gas production in East Texas (MMCF/d)"
      - name: south_texas
        description: "Daily dry gas production in South Texas (MMCF/d)"
      - name: mid_con
        description: "Composite: oklahoma + kansas + arkansas (MMCF/d)"
      - name: oklahoma
        description: "Daily dry gas production in Oklahoma (MMCF/d)"
      - name: kansas
        description: "Daily dry gas production in Kansas (MMCF/d)"
      - name: arkansas
        description: "Daily dry gas production in Arkansas (MMCF/d)"
      - name: permian
        description: "Composite: permian_new_mexico + permian_texas (MMCF/d)"
      - name: permian_new_mexico
        description: "Daily dry gas production in Permian New Mexico (MMCF/d)"
      - name: permian_texas
        description: "Daily dry gas production in Permian Texas (MMCF/d)"
      - name: permian_flare_counts
        description: "Count of observed flaring events in the Permian Basin"
      - name: permian_flare_volume
        description: "Estimated flaring volume in the Permian Basin (MMCF/d)"
      - name: san_juan
        description: '{{ doc("genscape_dpp_col_san_juan") }}'
      - name: rockies
        description: "Composite: piceance_basin + colorado_denver_julesberg + north_dakota_montana + utah_uinta + wyoming_green_wind_ot + wyoming_powder + other_rockies (MMCF/d)"
      - name: piceance_basin
        description: "Daily dry gas production in Piceance Basin, CO (MMCF/d)"
      - name: colorado_denver_julesberg
        description: "Daily dry gas production in Colorado Denver-Julesberg Basin (MMCF/d)"
      - name: north_dakota_montana
        description: "Daily dry gas production in North Dakota and Montana (MMCF/d)"
      - name: utah_uinta
        description: "Daily dry gas production in Utah Uinta Basin (MMCF/d)"
      - name: wyoming_green_wind_ot
        description: "Daily dry gas production in Wyoming Green/Wind River and Other (MMCF/d)"
      - name: wyoming_powder
        description: "Daily dry gas production in Wyoming Powder River Basin (MMCF/d)"
      - name: other_rockies
        description: "Daily dry gas production in Other Rockies regions (MMCF/d)"
      - name: west
        description: '{{ doc("genscape_dpp_col_west") }}'
      - name: east
        description: "Composite: ohio + southwest_pennsylvania + northeast_pennsylvania + west_virginia + other_east_ga_il_in_md_nc_tn_ky_mi_ny_va (MMCF/d)"
      - name: ohio
        description: "Daily dry gas production in Ohio (MMCF/d)"
      - name: southwest_pennsylvania
        description: "Daily dry gas production in Southwest Pennsylvania (MMCF/d)"
      - name: northeast_pennsylvania
        description: "Daily dry gas production in Northeast Pennsylvania (MMCF/d)"
      - name: west_virginia
        description: "Daily dry gas production in West Virginia (MMCF/d)"
      - name: other_east_ga_il_in_md_nc_tn_ky_mi_ny_va
        description: "Daily dry gas production in Other East regions - GA, IL, IN, MD, NC, TN, KY, MI, NY, VA (MMCF/d)"
      - name: western_canada
        description: '{{ doc("genscape_dpp_col_western_canada") }}'

  - name: staging_v2_daily_power_estimate
    description: '{{ doc("genscape_daily_power_estimate_staging") }}'
    columns:
      - name: gasday
        description: '{{ doc("genscape_dpe_col_gasday") }}'
        tests:
          - not_null
      - name: power_burn_variable
        description: '{{ doc("genscape_dpe_col_power_burn_variable") }}'
        tests:
          - not_null
      - name: modeltype
        description: '{{ doc("genscape_dpe_col_modeltype") }}'
        tests:
          - not_null
