version: 2

models:

  # ===========================
  # WDD Observed
  # ===========================

  - name: wdd_observed_daily
    description: >
      Daily observed weighted degree days by region. Unpivoted from the raw
      daily_observed_wdd table so each row is a date x region combination with
      data type values as columns. Grain: date x region.
    columns:
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
                - 'CONUS'
                - 'GASPRODUCING'
                - 'GASCONSEAST'
                - 'GASCONSWEST'
      - name: electric_cdd
        description: 'Electric-weighted cooling degree days.'
      - name: electric_hdd
        description: 'Electric-weighted heating degree days.'
      - name: gas_cdd
        description: 'Gas-weighted cooling degree days.'
      - name: gas_hdd
        description: 'Gas-weighted heating degree days.'
      - name: oil_cdd
        description: 'Oil-weighted cooling degree days.'
      - name: oil_hdd
        description: 'Oil-weighted heating degree days.'
      - name: population_cdd
        description: 'Population-weighted cooling degree days.'
      - name: population_hdd
        description: 'Population-weighted heating degree days.'

  # ===========================
  # WDD Normals (Long Format)
  # ===========================

  - name: wdd_normals_daily
    description: >
      10-year and 30-year WDD normals in long format, computed from daily observed data.
      For each calendar day (mm_dd), region, and period (10_year / 30_year), provides
      AVG (wdd_normal), MIN, MAX, and STDDEV for each WDD type. Includes a computed
      TDD column (gas_hdd + population_cdd). Feb 29 observations are folded into Feb 28
      for statistical stability. Grain: mm_dd x region x period.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - mm_dd
            - region
            - period
    columns:
      - name: mm_dd
        description: 'Calendar day as MM-DD string. Feb 29 is folded into Feb 28.'
        tests:
          - not_null
      - name: month
        description: 'Calendar month number extracted from mm_dd.'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
                - 'CONUS'
                - 'GASPRODUCING'
                - 'GASCONSEAST'
                - 'GASCONSWEST'
      - name: period
        description: 'Normal lookback period: 10_year or 30_year.'
        tests:
          - not_null
          - accepted_values:
              values:
                - '10_year'
                - '30_year'
      - name: min_year
        description: 'Earliest year included in the lookback window.'
      - name: max_year
        description: 'Latest year included in the lookback window.'
      - name: years_count
        description: 'Number of distinct years contributing to the normal.'
        tests:
          - not_null
      - name: electric_cdd_normal
        description: 'Electric-weighted CDD average for the period.'
        tests:
          - not_null
      - name: electric_hdd_normal
        description: 'Electric-weighted HDD average for the period.'
        tests:
          - not_null
      - name: gas_cdd_normal
        description: 'Gas-weighted CDD average for the period.'
        tests:
          - not_null
      - name: gas_hdd_normal
        description: 'Gas-weighted HDD average for the period.'
        tests:
          - not_null
      - name: population_cdd_normal
        description: 'Population-weighted CDD average for the period.'
        tests:
          - not_null
      - name: population_hdd_normal
        description: 'Population-weighted HDD average for the period.'
        tests:
          - not_null
      - name: tdd_normal
        description: 'Total degree day (gas_hdd + population_cdd) average for the period.'
        tests:
          - not_null
      - name: electric_cdd_min
        description: 'Electric-weighted CDD minimum for the period.'
      - name: electric_hdd_min
        description: 'Electric-weighted HDD minimum for the period.'
      - name: gas_cdd_min
        description: 'Gas-weighted CDD minimum for the period.'
      - name: gas_hdd_min
        description: 'Gas-weighted HDD minimum for the period.'
      - name: population_cdd_min
        description: 'Population-weighted CDD minimum for the period.'
      - name: population_hdd_min
        description: 'Population-weighted HDD minimum for the period.'
      - name: tdd_min
        description: 'Total degree day minimum for the period.'
      - name: electric_cdd_max
        description: 'Electric-weighted CDD maximum for the period.'
      - name: electric_hdd_max
        description: 'Electric-weighted HDD maximum for the period.'
      - name: gas_cdd_max
        description: 'Gas-weighted CDD maximum for the period.'
      - name: gas_hdd_max
        description: 'Gas-weighted HDD maximum for the period.'
      - name: population_cdd_max
        description: 'Population-weighted CDD maximum for the period.'
      - name: population_hdd_max
        description: 'Population-weighted HDD maximum for the period.'
      - name: tdd_max
        description: 'Total degree day maximum for the period.'
      - name: electric_cdd_stddev
        description: 'Electric-weighted CDD standard deviation for the period.'
      - name: electric_hdd_stddev
        description: 'Electric-weighted HDD standard deviation for the period.'
      - name: gas_cdd_stddev
        description: 'Gas-weighted CDD standard deviation for the period.'
      - name: gas_hdd_stddev
        description: 'Gas-weighted HDD standard deviation for the period.'
      - name: population_cdd_stddev
        description: 'Population-weighted CDD standard deviation for the period.'
      - name: population_hdd_stddev
        description: 'Population-weighted HDD standard deviation for the period.'
      - name: tdd_stddev
        description: 'Total degree day standard deviation for the period.'

  # ===========================
  # WDD Daily Combined (Forecast + Observed + Normals)
  # ===========================

  - name: wdd_daily
    description: >
      Combined daily WDD mart joining latest forecasts with observed actuals and
      10-year normals for side-by-side analysis. Forecast-centric: one row per
      date x region x model x cycle from the most recent complete forecast run
      (forecast_rank = 1, bias_corrected = false, 15-day horizon confirmed by
      staging pipeline). Forecast-difference columns are excluded.
      Observed values are NULL for future dates; normals are matched by calendar
      day (MM-DD) with Feb 29 folded into Feb 28.
      Grain: date x region x model x cycle.
    columns:
      - name: date
        description: 'Forecast target date (aliased from forecast_date).'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'CONUS'
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
      - name: model
        description: 'Forecast model name.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'GFS_OP'
                - 'GFS_ENS'
                - 'ECMWF_OP'
                - 'ECMWF_ENS'
                - 'WSI'
      - name: cycle
        description: 'Model cycle (00Z or 12Z for NWP models; NULL for WSI blend).'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the 15-day forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution (always 15).'
      - name: fcst_electric_cdd
        description: 'Forecast electric-weighted cooling degree days.'
      - name: fcst_electric_hdd
        description: 'Forecast electric-weighted heating degree days.'
      - name: fcst_gas_cdd
        description: 'Forecast gas-weighted cooling degree days.'
      - name: fcst_gas_hdd
        description: 'Forecast gas-weighted heating degree days.'
      - name: fcst_pw_cdd
        description: 'Forecast population-weighted cooling degree days.'
      - name: fcst_pw_hdd
        description: 'Forecast population-weighted heating degree days.'
      - name: fcst_tdd
        description: 'Forecast total degree days (gas_hdd + pw_cdd).'
      - name: obs_electric_cdd
        description: 'Observed electric-weighted CDD (NULL for future dates).'
      - name: obs_electric_hdd
        description: 'Observed electric-weighted HDD (NULL for future dates).'
      - name: obs_gas_cdd
        description: 'Observed gas-weighted CDD (NULL for future dates).'
      - name: obs_gas_hdd
        description: 'Observed gas-weighted HDD (NULL for future dates).'
      - name: obs_pw_cdd
        description: 'Observed population-weighted CDD (NULL for future dates).'
      - name: obs_pw_hdd
        description: 'Observed population-weighted HDD (NULL for future dates).'
      - name: nrm_electric_cdd
        description: '10-year normal electric-weighted CDD for this calendar day.'
      - name: nrm_electric_hdd
        description: '10-year normal electric-weighted HDD for this calendar day.'
      - name: nrm_gas_cdd
        description: '10-year normal gas-weighted CDD for this calendar day.'
      - name: nrm_gas_hdd
        description: '10-year normal gas-weighted HDD for this calendar day.'
      - name: nrm_pw_cdd
        description: '10-year normal population-weighted CDD for this calendar day.'
      - name: nrm_pw_hdd
        description: '10-year normal population-weighted HDD for this calendar day.'
      - name: nrm_tdd
        description: '10-year normal total degree days (gas_hdd + population_cdd).'

  # ===========================
  # WDD Daily Forecasts (NWP + WSI)
  # ===========================

  - name: wdd_forecasts_daily
    description: >
      Combined daily WDD forecasts from model runs (GFS_OP, GFS_ENS, ECMWF_OP, ECMWF_ENS)
      and WSI proprietary blend. Includes forecast values and run-over-run differences. Model runs have 00Z/12Z cycles;
      WSI blend has cycle = NULL. Ranked by execution time with human-readable labels.
      Grain: forecast_execution_datetime x forecast_date x model x cycle x bias_corrected x region.
    columns:
      - name: forecast_rank
        description: 'Execution rank (1 = most recent, descending).'
        tests:
          - not_null
      - name: forecast_label
        description: 'Human-readable label: Current Forecast, 12hrs Ago, 24hrs Ago, Friday 12z, or NULL.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: cycle
        description: 'Model cycle (00Z or 12Z for model runs; NULL for WSI blend).'
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Number of forecast days in this run.'
      - name: max_forecast_days
        description: 'Maximum forecast days expected (typically 15).'
      - name: model
        description: 'Forecast model name.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'GFS_OP'
                - 'GFS_ENS'
                - 'ECMWF_OP'
                - 'ECMWF_ENS'
                - 'WSI'
      - name: bias_corrected
        description: 'Whether the forecast is bias-corrected.'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'CONUS'
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
      - name: electric_cdd
        description: 'Electric-weighted cooling degree days.'
      - name: electric_hdd
        description: 'Electric-weighted heating degree days.'
      - name: gas_cdd
        description: 'Gas-weighted cooling degree days.'
      - name: gas_hdd
        description: 'Gas-weighted heating degree days.'
      - name: pw_cdd
        description: 'Population-weighted cooling degree days.'
      - name: pw_hdd
        description: 'Population-weighted heating degree days.'
      - name: electric_cdd_diff_run_over_run
        description: 'Electric CDD run-over-run change (12hr for NWP, 24hr for WSI).'
      - name: electric_hdd_diff_run_over_run
        description: 'Electric HDD run-over-run change.'
      - name: gas_cdd_diff_run_over_run
        description: 'Gas CDD run-over-run change.'
      - name: gas_hdd_diff_run_over_run
        description: 'Gas HDD run-over-run change.'
      - name: pw_cdd_diff_run_over_run
        description: 'Population-weighted CDD run-over-run change.'
      - name: pw_hdd_diff_run_over_run
        description: 'Population-weighted HDD run-over-run change.'

  # ===========================
  # Hourly Forecast Temperatures
  # ===========================

  - name: temp_forecast_hourly
    description: >
      Hourly temperature forecasts from WSI GetHourlyForecast API. One row per
      local_time x station with temperature, feels-like, dewpoint, cloud cover,
      wind, precipitation, and GHI irradiance forecasts. Includes derived date
      and hour columns. Grain: local_time x region x site_id x station_name.
    columns:
      - name: local_time
        description: 'Forecast target timestamp in local prevailing timezone.'
        tests:
          - not_null
      - name: date
        description: 'Forecast target date (derived from local_time).'
        tests:
          - not_null
      - name: hour_ending
        description: 'Forecast target hour ending (0–23, derived from local_time).'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region grouping for the weather station.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI unique weather station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable weather station name.'
        tests:
          - not_null
      - name: temperature
        description: 'Forecast temperature (°F).'
      - name: temperature_diff
        description: 'Forecast temperature difference from normal (°F).'
      - name: temperature_normal
        description: 'Normal temperature for the forecasted hour (°F).'
      - name: dewpoint
        description: 'Forecast dewpoint temperature (°F).'
      - name: cloud_cover_pct
        description: 'Forecast cloud cover percentage.'
      - name: feels_like_temperature
        description: 'Forecast feels-like temperature (°F).'
      - name: feels_like_temperature_diff
        description: 'Forecast feels-like temperature difference from normal (°F).'
      - name: precipitation
        description: 'Forecast precipitation amount.'
      - name: wind_direction
        description: 'Forecast wind direction in degrees (0–360).'
      - name: wind_speed
        description: 'Forecast wind speed (mph).'
      - name: ghi_irradiance
        description: 'Forecast global horizontal irradiance.'
      - name: created_at
        description: 'Row creation timestamp from ingestion pipeline.'
      - name: updated_at
        description: 'Row last-updated timestamp from ingestion pipeline.'

  # ===========================
  # Hourly Observed Temperatures
  # ===========================

  - name: temp_observed_hourly
    description: >
      Hourly observed weather station temperatures and conditions from WSI
      HISTORICAL_HOURLY_OBSERVED. One row per datetime x station with temperature,
      dewpoint, cloud cover, wind, humidity, and precipitation.
      Grain: datetime x region x site_id x station_name.
    columns:
      - name: datetime
        description: 'Combined observation timestamp (date + hour interval).'
        tests:
          - not_null
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: hour_ending
        description: 'Observation hour ending (0–23).'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region grouping for the weather station.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI unique weather station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable weather station name.'
        tests:
          - not_null
      - name: temperature
        description: 'Observed temperature (°F).'
      - name: dewpoint
        description: 'Observed dewpoint temperature (°F).'
      - name: cloud_cover_pct
        description: 'Observed cloud cover percentage (0–100).'
      - name: wind_direction
        description: 'Observed wind direction in degrees (0–360).'
      - name: wind_speed
        description: 'Observed wind speed (mph).'
      - name: heat_index
        description: 'Computed heat index (°F).'
      - name: wind_chill
        description: 'Computed wind chill (°F).'
      - name: relative_humidity
        description: 'Observed relative humidity percentage.'
      - name: precipitation
        description: 'Observed precipitation amount.'

  # ===========================
  # Daily Observed Temperatures
  # ===========================

  - name: temp_observed_daily
    description: >
      Daily observed temperatures by region and station. Normalized region names
      (CONUS, SOUTHCENTRAL) from raw WSI data. Filtered to last 31 years for
      normals computation support. Grain: date x region x site_id x station_name.
    columns:
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable station name.'
        tests:
          - not_null
      - name: temp
        description: 'Average observed temperature (°F).'
      - name: temp_min
        description: 'Minimum observed temperature (°F).'
      - name: temp_max
        description: 'Maximum observed temperature (°F).'
      - name: cdd
        description: 'Cooling degree days.'
      - name: hdd
        description: 'Heating degree days.'

  # ===========================
  # Daily Combined Temps (Forecast + Observed)
  # ===========================

  - name: temps_daily
    description: >
      Combined daily temperature mart joining the latest city-level weighted
      forecast with observed actuals for side-by-side analysis at the station
      level. Forecast-centric: one row per date x region x site_id x
      station_name from the most recent complete forecast run
      (rank_forecast_execution_timestamps = 1, max_forecast_days >= 14,
      latest revision per site/date). Observed values are NULL for future
      dates. No model/cycle/bias_corrected fields (N/A for city-level
      source). No normals or difference columns.
      Grain: date x region x site_id x station_name.
    columns:
      - name: date
        description: 'Forecast target date (aliased from forecast_date).'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier (ICAO code).'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable weather station name.'
        tests:
          - not_null
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution (>= 14).'
      - name: fcst_min_temp
        description: 'Forecast minimum temperature (°F).'
      - name: fcst_max_temp
        description: 'Forecast maximum temperature (°F).'
      - name: fcst_avg_temp
        description: 'Forecast average temperature (°F).'
      - name: fcst_cdd
        description: 'Forecast cooling degree days.'
      - name: fcst_hdd
        description: 'Forecast heating degree days.'
      - name: obs_temp
        description: 'Observed average temperature (°F, NULL for future dates).'
      - name: obs_temp_min
        description: 'Observed minimum temperature (°F, NULL for future dates).'
      - name: obs_temp_max
        description: 'Observed maximum temperature (°F, NULL for future dates).'
      - name: obs_cdd
        description: 'Observed cooling degree days (NULL for future dates).'
      - name: obs_hdd
        description: 'Observed heating degree days (NULL for future dates).'

  # ===========================
  # Daily Forecast Temperatures
  # ===========================

  - name: temp_forecast_daily
    description: >
      Current daily temperature forecast combining WSI homepage forecast tables
      (average, min/max, HDD/CDD). Shows only the most recent complete forecast
      execution. Grain: forecast_execution_datetime x forecast_date x site_id.
    columns:
      - name: rank_forecast_execution_timestamps
        description: 'Execution rank (always 1 — current forecast only).'
      - name: labelled_forecast_execution_timestamp
        description: 'Always Current Forecast after staging filter.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution.'
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable station name.'
      - name: min_temp
        description: 'Forecast minimum temperature (°F).'
      - name: max_temp
        description: 'Forecast maximum temperature (°F).'
      - name: avg_temp
        description: 'Forecast average temperature (°F).'
      - name: cdd
        description: 'Forecast cooling degree days.'
      - name: hdd
        description: 'Forecast heating degree days.'
