version: 2

models:
  - name: source_v1_daily_observed_wdd
    description: >
      Unpivots the raw daily_observed_wdd table from wide format (regions as columns,
      data_type as rows) into long format (region as a row dimension, data types as columns).
      Grain: date x region.
    columns:
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
                - 'CONUS'
                - 'GASPRODUCING'
                - 'GASCONSEAST'
                - 'GASCONSWEST'
      - name: electric_cdd
        description: 'Electric-weighted cooling degree days.'
      - name: electric_hdd
        description: 'Electric-weighted heating degree days.'
      - name: gas_cdd
        description: 'Gas-weighted cooling degree days.'
      - name: gas_hdd
        description: 'Gas-weighted heating degree days.'
      - name: oil_cdd
        description: 'Oil-weighted cooling degree days.'
      - name: oil_hdd
        description: 'Oil-weighted heating degree days.'
      - name: population_cdd
        description: 'Population-weighted cooling degree days.'
      - name: population_hdd
        description: 'Population-weighted heating degree days.'

  - name: source_v1_daily_forecast_wdd
    description: >
      UNION ALL of all per-model WDD forecast tables (WSI, GFS_OP, GFS_ENS,
      ECMWF_OP, ECMWF_ENS). Selects and casts all degree-day columns,
      derives cycle from init_time hour, and applies a 365-day lookback and region filter.
      Grain: forecast_execution_datetime x forecast_date x model x cycle x bias_corrected x region.
    columns:
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date (derived from forecast_execution_datetime).'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: model
        description: 'Forecast model name (WSI, GFS_OP, GFS_ENS, ECMWF_OP, ECMWF_ENS).'
        tests:
          - not_null
      - name: cycle
        description: 'Model cycle (e.g. 00Z, 12Z). NULL for WSI blend.'
      - name: bias_corrected
        description: 'Whether the forecast is bias-corrected.'
        tests:
          - not_null
      - name: region
        description: 'WSI North America gas region.'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'CONUS'
                - 'EAST'
                - 'MIDWEST'
                - 'MOUNTAIN'
                - 'PACIFIC'
                - 'SOUTHCENTRAL'
      - name: electric_cdd
        description: 'Electric-weighted cooling degree days.'
      - name: electric_hdd
        description: 'Electric-weighted heating degree days.'
      - name: gas_cdd
        description: 'Gas-weighted cooling degree days.'
      - name: gas_hdd
        description: 'Gas-weighted heating degree days.'
      - name: pw_cdd
        description: 'Population-weighted cooling degree days (aliased from population_cdd).'
      - name: pw_hdd
        description: 'Population-weighted heating degree days (aliased from population_hdd).'

  - name: source_v1_hourly_forecast_temp
    description: >
      Selects and casts all columns from the raw hourly_forecast_temp_v4_2025_jan_12 table.
      Aliases abbreviated raw column names to clean snake_case. One row per
      local_time x region x site_id x station_name with forecast weather fields.
      Grain: local_time x region x site_id x station_name.
    columns:
      - name: local_time
        description: 'Forecast target timestamp in local prevailing timezone.'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region grouping for the weather station.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI unique weather station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable weather station name.'
        tests:
          - not_null
      - name: temperature
        description: 'Forecast temperature (°F).'
      - name: temperature_diff
        description: 'Forecast temperature difference from normal (°F).'
      - name: temperature_normal
        description: 'Normal temperature for the forecasted hour (°F).'
      - name: dewpoint
        description: 'Forecast dewpoint temperature (°F).'
      - name: cloud_cover_pct
        description: 'Forecast cloud cover percentage.'
      - name: feels_like_temperature
        description: 'Forecast feels-like temperature (°F).'
      - name: feels_like_temperature_diff
        description: 'Forecast feels-like temperature difference from normal (°F).'
      - name: precipitation
        description: 'Forecast precipitation amount.'
      - name: wind_direction
        description: 'Forecast wind direction in degrees (0–360).'
      - name: wind_speed
        description: 'Forecast wind speed (mph).'
      - name: ghi_irradiance
        description: 'Forecast global horizontal irradiance.'
      - name: created_at
        description: 'Row creation timestamp from ingestion pipeline.'
      - name: updated_at
        description: 'Row last-updated timestamp from ingestion pipeline.'

  - name: source_v1_hourly_observed_temp
    description: >
      Selects and casts all columns from the raw hourly_observed_temp_v2_20250722 table.
      One row per date x hour x region x site_id x station_name with weather measurements.
      Grain: date x hour x region x site_id x station_name.
    columns:
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: hour_ending
        description: 'Observation hour ending (0–23).'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region grouping for the weather station.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI unique weather station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable weather station name.'
        tests:
          - not_null
      - name: temperature
        description: 'Observed temperature (°F).'
      - name: dewpoint
        description: 'Observed dewpoint temperature (°F).'
      - name: cloud_cover_pct
        description: 'Observed cloud cover percentage (0–100).'
      - name: wind_direction
        description: 'Observed wind direction in degrees (0–360).'
      - name: wind_speed
        description: 'Observed wind speed (mph).'
      - name: heat_index
        description: 'Computed heat index (°F).'
      - name: wind_chill
        description: 'Computed wind chill (°F).'
      - name: relative_humidity
        description: 'Observed relative humidity percentage.'
      - name: precipitation
        description: 'Observed precipitation amount.'

  - name: source_v1_daily_observed_temp
    description: >
      Selects and normalizes daily observed temperature data from
      daily_observed_temp_v3_2025_09_08. Standardizes region/site_id/station_name
      values (US_NATIONAL → CONUS, SOUTH CENTRAL → SOUTHCENTRAL). Filters to
      last 31 years for normals computation. Grain: date x region x site_id x station_name.
    columns:
      - name: date
        description: 'Observation date.'
        tests:
          - not_null
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable station name.'
        tests:
          - not_null
      - name: temp
        description: 'Average observed temperature (°F).'
      - name: temp_min
        description: 'Minimum observed temperature (°F).'
      - name: temp_max
        description: 'Maximum observed temperature (°F).'
      - name: cdd
        description: 'Cooling degree days.'
      - name: hdd
        description: 'Heating degree days.'

  - name: source_v1_wsi_homepage_forecast_table_avg
    description: >
      Extracts and processes WSI homepage daily forecast average temperatures.
      Joins to trader city seed for region/station mapping. Applies revision
      deduplication, 14-day completeness filter, and forecast ranking.
      Grain: forecast_execution_datetime x forecast_date x site_id.
    columns:
      - name: rank_forecast_execution_timestamps
        description: 'Execution rank (1 = most recent, descending).'
      - name: labelled_forecast_execution_timestamp
        description: 'Human-readable label: Current Forecast or NULL.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution.'
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable station name.'
      - name: avg_temp
        description: 'Forecast average temperature (°F).'
      - name: avg_temp_normals
        description: 'Normal average temperature for the forecast date (°F).'

  - name: source_v1_wsi_homepage_forecast_table_hddcdd
    description: >
      Extracts and processes WSI homepage daily forecast HDD/CDD degree days.
      Joins to trader city seed for region/station mapping. Applies revision
      deduplication, 14-day completeness filter, and forecast ranking.
      Grain: forecast_execution_datetime x forecast_date x site_id.
    columns:
      - name: rank_forecast_execution_timestamps
        description: 'Execution rank (1 = most recent, descending).'
      - name: labelled_forecast_execution_timestamp
        description: 'Human-readable label: Current Forecast or NULL.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution.'
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable station name.'
      - name: cdd
        description: 'Forecast cooling degree days.'
      - name: hdd
        description: 'Forecast heating degree days.'
      - name: hdd_cdd_normals
        description: 'Normal HDD/CDD value for the forecast date.'

  - name: source_v1_wsi_homepage_forecast_table_minmax
    description: >
      Extracts and processes WSI homepage daily forecast min/max temperatures.
      Joins to trader city seed for region/station mapping. Applies revision
      deduplication, 14-day completeness filter, and forecast ranking.
      Grain: forecast_execution_datetime x forecast_date x site_id.
    columns:
      - name: rank_forecast_execution_timestamps
        description: 'Execution rank (1 = most recent, descending).'
      - name: labelled_forecast_execution_timestamp
        description: 'Human-readable label: Current Forecast or NULL.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution.'
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier.'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable station name.'
      - name: min_temp
        description: 'Forecast minimum temperature (°F).'
      - name: max_temp
        description: 'Forecast maximum temperature (°F).'
      - name: min_temp_normals
        description: 'Normal minimum temperature for the forecast date (°F).'
      - name: max_temp_normals
        description: 'Normal maximum temperature for the forecast date (°F).'

  - name: source_v1_weighted_daily_forecast_temp_city
    description: >
      City-level daily temperature forecast from WSI weighted temp API.
      Joins to trader city seed for region mapping. Applies revision deduplication,
      14-day completeness filter, and forecast ranking.
      Grain: forecast_execution_datetime x forecast_date x site_id.
    columns:
      - name: rank_forecast_execution_timestamps
        description: 'Execution rank (1 = most recent, descending).'
      - name: labelled_forecast_execution_timestamp
        description: 'Human-readable label: Current Forecast or NULL.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution.'
      - name: region
        description: 'WSI geographic region.'
        tests:
          - not_null
      - name: site_id
        description: 'WSI station identifier (ICAO code).'
        tests:
          - not_null
      - name: station_name
        description: 'Human-readable station name.'
      - name: min_temp
        description: 'Forecast minimum temperature (°F).'
      - name: max_temp
        description: 'Forecast maximum temperature (°F).'
      - name: average_temp
        description: 'Forecast average temperature (°F).'
      - name: cdd
        description: 'Forecast cooling degree days.'
      - name: hdd
        description: 'Forecast heating degree days.'

  - name: source_v1_weighted_daily_forecast_temp_iso_models
    description: >
      ISO-region daily temperature forecast from NWP models (GFS_OP, GFS_ENS,
      ECMWF_OP, ECMWF_ENS). Constructs execution timestamp from date + cycle.
      Applies revision deduplication, 14-day completeness filter, and forecast ranking.
      Grain: forecast_execution_datetime x forecast_date x model x cycle x bias_corrected x region.
    columns:
      - name: rank_forecast_execution_timestamps
        description: 'Execution rank (1 = most recent, descending).'
      - name: labelled_forecast_execution_timestamp
        description: 'Human-readable label: Current Forecast or NULL.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: cycle
        description: 'Model cycle (00Z or 12Z).'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution.'
      - name: model
        description: 'Forecast model name (GFS_OP, GFS_ENS, ECMWF_OP, ECMWF_ENS).'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'GFS_OP'
                - 'GFS_ENS'
                - 'ECMWF_OP'
                - 'ECMWF_ENS'
      - name: bias_corrected
        description: 'Whether the forecast is bias-corrected.'
        tests:
          - not_null
      - name: region
        description: 'WSI ISO region.'
        tests:
          - not_null
      - name: min_temp
        description: 'Forecast minimum temperature (°F).'
      - name: max_temp
        description: 'Forecast maximum temperature (°F).'
      - name: average_temp_dfn
        description: 'Forecast average temperature departure from normal (°F).'
      - name: cdd
        description: 'Forecast cooling degree days.'
      - name: hdd
        description: 'Forecast heating degree days.'

  - name: source_v1_weighted_daily_forecast_temp_iso_wsi
    description: >
      ISO-region daily temperature forecast from WSI proprietary blend model.
      Applies revision deduplication, 14-day completeness filter, and forecast ranking.
      Includes temperature diffs, DFN, and heat index metrics.
      Grain: forecast_execution_datetime x forecast_date x model x bias_corrected x region.
    columns:
      - name: rank_forecast_execution_timestamps
        description: 'Execution rank (1 = most recent, descending).'
      - name: labelled_forecast_execution_timestamp
        description: 'Human-readable label: Current Forecast or NULL.'
      - name: forecast_execution_datetime
        description: 'Forecast model initialization timestamp.'
        tests:
          - not_null
      - name: forecast_execution_date
        description: 'Forecast initialization date.'
        tests:
          - not_null
      - name: forecast_date
        description: 'Target forecast date.'
        tests:
          - not_null
      - name: count_forecast_days
        description: 'Day number within the forecast horizon.'
      - name: max_forecast_days
        description: 'Maximum forecast days in this execution.'
      - name: model
        description: 'Forecast model name (WSI).'
        tests:
          - not_null
          - accepted_values:
              values:
                - 'WSI'
      - name: bias_corrected
        description: 'Whether the forecast is bias-corrected.'
        tests:
          - not_null
      - name: region
        description: 'WSI ISO region.'
        tests:
          - not_null
      - name: min_temp
        description: 'Forecast minimum temperature (°F).'
      - name: max_temp
        description: 'Forecast maximum temperature (°F).'
      - name: min_temp_diff
        description: 'Minimum temperature run-over-run difference (°F).'
      - name: max_temp_diff
        description: 'Maximum temperature run-over-run difference (°F).'
      - name: min_temp_dfn
        description: 'Minimum temperature departure from normal (°F).'
      - name: max_temp_dfn
        description: 'Maximum temperature departure from normal (°F).'
      - name: average_temp_dfn
        description: 'Average temperature departure from normal (°F).'
      - name: hdd
        description: 'Forecast heating degree days.'
      - name: hdd_diff
        description: 'HDD run-over-run difference.'
      - name: cdd
        description: 'Forecast cooling degree days.'
      - name: cdd_diff
        description: 'CDD run-over-run difference.'
      - name: heat_index
        description: 'Forecast heat index (°F).'
      - name: heat_index_diff
        description: 'Heat index run-over-run difference (°F).'
      - name: diff_from_max_temp
        description: 'Difference from maximum temperature (°F).'
