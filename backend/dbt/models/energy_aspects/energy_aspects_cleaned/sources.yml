version: 2

sources:

  - name: energy_aspects_v1
    schema: energy_aspects
    description: '{{ doc("ea_overview") }}'
    tables:
      - name: iso_dispatch_costs
        description: '{{ doc("ea_source_iso_dispatch_costs") }}'
      - name: us_regional_power_model
        description: '{{ doc("ea_source_us_regional_power_model") }}'
      - name: na_power_price_heat_rate_spark_forecasts
        description: '{{ doc("ea_source_na_power_price_hr_spark") }}'
      - name: monthly_iso_load_model
        description: '{{ doc("ea_source_monthly_iso_load_model") }}'
      - name: us_installed_capacity_by_iso_and_fuel_type
        description: '{{ doc("ea_source_us_installed_capacity") }}'
      - name: lower_48_average_power_demand_mw
        description: '{{ doc("ea_source_lower_48_avg_power_demand") }}'
      - name: lower_48_generation_forecast_mw
        description: "Monthly EA forecast for Lower 48 generation by fuel type (MW). US48 aggregate only."
      - name: lower_48_gas_generation_forecast_mw
        description: "Monthly EA forecast for Lower 48 natural gas generation (MW). US48 aggregate only."
      - name: lower_48_installed_capacity_mw
        description: "Monthly EA forecast for Lower 48 installed capacity by fuel type (MW). US48 aggregate only."
