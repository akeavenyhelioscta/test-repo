      - name: bit_coal_low_transport_dispatch_cost_pjm_w
        description: "Bituminous coal dispatch cost with low transport cost in PJM W ($/MWh, RGGI included)."
      - name: bit_coal_mid_transport_dispatch_cost_pjm_w
        description: "Bituminous coal dispatch cost with mid transport cost in PJM W ($/MWh, RGGI included)."
      - name: bit_coal_high_transport_fuel_cost_pjm_w
        description: "Bituminous coal fuel cost with high transport cost in PJM W ($/MWh)."
      - name: bit_coal_low_transport_fuel_cost_pjm_w
        description: "Bituminous coal fuel cost with low transport cost in PJM W ($/MWh)."
