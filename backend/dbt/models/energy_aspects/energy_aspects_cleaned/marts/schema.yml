version: 2

models:
  - name: ea_pjm_power_model_monthly
    description: >
      EA PJM Regional Power Model — monthly generation by fuel type, demand,
      natural gas demand, and net imports for PJM.
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'
        tests:
          - not_null
          - unique
      - name: coal_generation_ea_price_mw
        description: '{{ doc("ea_col_coal_generation_ea_price_mw") }}'
      - name: coal_generation_fwd_price_mw
        description: '{{ doc("ea_col_coal_generation_fwd_price_mw") }}'
      - name: ng_generation_ea_price_mw
        description: '{{ doc("ea_col_ng_generation_ea_price_mw") }}'
      - name: ng_generation_fwd_price_mw
        description: '{{ doc("ea_col_ng_generation_fwd_price_mw") }}'
      - name: nuclear_generation_mw
        description: '{{ doc("ea_col_nuclear_generation_mw") }}'
      - name: solar_generation_mw
        description: '{{ doc("ea_col_solar_generation_mw") }}'
      - name: wind_generation_mw
        description: '{{ doc("ea_col_wind_generation_mw") }}'
      - name: hydro_generation_mw
        description: '{{ doc("ea_col_hydro_generation_mw") }}'
      - name: other_generation_mw
        description: '{{ doc("ea_col_other_generation_mw") }}'
      - name: thermal_generation_norm_weather_mw
        description: '{{ doc("ea_col_thermal_generation_norm_weather_mw") }}'
      - name: net_imports_mw
        description: '{{ doc("ea_col_net_imports_mw") }}'
      - name: demand_mw
        description: '{{ doc("ea_col_demand_mw") }}'
      - name: ng_demand_ea_price_bcf_per_d
        description: '{{ doc("ea_col_ng_demand_ea_price_bcf_per_d") }}'
      - name: ng_demand_fwd_price_bcf_per_d
        description: '{{ doc("ea_col_ng_demand_fwd_price_bcf_per_d") }}'
      - name: ng_equiv_demand_norm_weather_bcf_per_d
        description: '{{ doc("ea_col_ng_equiv_demand_norm_weather_bcf_per_d") }}'

  - name: ea_pjm_price_hr_spark_monthly
    description: >
      EA PJM West on-peak power price, heat rate, and dirty spark spread
      forecasts at monthly grain.
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'
        tests:
          - not_null
          - unique
      - name: on_peak_power_price_usd_per_mwh
        description: '{{ doc("ea_col_on_peak_power_price") }}'
      - name: on_peak_heat_rate_mmbtu_per_mwh
        description: '{{ doc("ea_col_on_peak_heat_rate") }}'
      - name: on_peak_dirty_spark_spread_usd_per_mwh
        description: '{{ doc("ea_col_on_peak_dirty_spark_spread") }}'

  - name: ea_pjm_load_model_monthly
    description: >
      EA PJM weather-normalized load model — modeled/forecast load under
      normal weather and actual load with forecast under normal weather.
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'
        tests:
          - not_null
          - unique
      - name: load_norm_weather_mw
        description: '{{ doc("ea_col_load_norm_weather_mw") }}'
      - name: actual_load_norm_weather_mw
        description: '{{ doc("ea_col_actual_load_norm_weather_mw") }}'

  - name: ea_pjm_installed_capacity_monthly
    description: >
      EA PJM installed generation capacity by fuel type at monthly grain.
      Covers natural gas, coal, nuclear, oil, solar, onshore/offshore wind,
      hydro, and battery.
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'
        tests:
          - not_null
          - unique
      - name: ng_capacity_mw
        description: "EA forecast for PJM natural gas installed capacity (MW)."
      - name: coal_capacity_mw
        description: "EA forecast for PJM coal installed capacity (MW)."
      - name: nuclear_capacity_mw
        description: "EA forecast for PJM nuclear installed capacity (MW)."
      - name: oil_capacity_mw
        description: "EA forecast for PJM oil products installed capacity (MW)."
      - name: solar_capacity_mw
        description: "EA forecast for PJM solar installed capacity (MW)."
      - name: onshore_wind_capacity_mw
        description: "EA forecast for PJM onshore wind installed capacity (MW)."
      - name: offshore_wind_capacity_mw
        description: "EA forecast for PJM offshore wind installed capacity (MW)."
      - name: hydro_capacity_mw
        description: "EA forecast for PJM hydro installed capacity (MW)."
      - name: battery_capacity_mw
        description: "EA forecast for PJM battery installed capacity (MW)."

  - name: ea_pjm_dispatch_costs_monthly
    description: >
      EA PJM dispatch costs and fuel costs by fuel type (NG, diesel, fuel oil,
      bituminous coal, sub-bituminous coal), plant type (CCGT, CT, ST), and
      hub (PJM W, Dominion, Nihub, Adhub) at monthly grain. All values in $/MWh.
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'
        tests:
          - not_null
          - unique
