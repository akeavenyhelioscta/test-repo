version: 2

models:
  - name: source_v1_ea_iso_dispatch_costs
    description: "Wide-format pass-through of EA ISO dispatch costs. 95 metric columns across all ISOs."
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'

  - name: source_v1_ea_us_regional_power_model
    description: "Wide-format pass-through of EA US regional power model. 175 metric columns across all ISOs."
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'

  - name: source_v1_ea_na_power_price_hr_spark
    description: "Wide-format pass-through of EA NA power price, heat rate and spark forecasts. 15 metric columns."
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'

  - name: source_v1_ea_monthly_iso_load_model
    description: "Wide-format pass-through of EA monthly ISO load model. 16 metric columns across all ISOs."
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'

  - name: source_v1_ea_us_installed_cap_by_iso_fuel
    description: "Wide-format pass-through of EA US installed capacity by ISO and fuel type. 84 metric columns."
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'

  - name: source_v1_ea_lower_48_avg_power_demand
    description: "Wide-format pass-through of EA Lower 48 average power demand. 7 ISO columns."
    columns:
      - name: date
        description: '{{ doc("ea_col_date") }}'
