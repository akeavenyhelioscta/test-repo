version: 2

models:
  - name: staging_v1_bbg_historical_with_tickers
    description: '{{ doc("bbg_dapi_staging_historical_with_tickers") }}'
    columns:
      - name: date
        description: '{{ doc("bbg_dapi_col_date") }}'
        tests:
          - not_null
      - name: snapshot_at
        description: '{{ doc("bbg_dapi_col_snapshot_at") }}'
        tests:
          - not_null
      - name: revision
        description: '{{ doc("bbg_dapi_col_revision") }}'
        tests:
          - not_null
      - name: max_revision
        description: '{{ doc("bbg_dapi_col_max_revision") }}'
        tests:
          - not_null
      - name: security
        description: '{{ doc("bbg_dapi_col_security") }}'
        tests:
          - not_null
      - name: description
        description: '{{ doc("bbg_dapi_col_description") }}'
      - name: data_type
        description: '{{ doc("bbg_dapi_col_data_type") }}'
        tests:
          - not_null
      - name: value
        description: '{{ doc("bbg_dapi_col_value") }}'
      - name: created_at
        description: '{{ doc("bbg_dapi_col_created_at") }}'
      - name: updated_at
        description: '{{ doc("bbg_dapi_col_updated_at") }}'

  - name: staging_v1_bbg_gas_supply_demand
    description: '{{ doc("bbg_dapi_staging_gas_supply_demand") }}'
    columns:
      - name: date
        description: "Observation date."
        tests:
          - not_null
      - name: snapshot_at
        description: '{{ doc("bbg_dapi_col_snapshot_at") }}'
        tests:
          - not_null
      - name: revision
        description: "Snapshot revision number within each date."
        tests:
          - not_null
      - name: max_revision
        description: "Total snapshots for this date."
        tests:
          - not_null
      - name: production
        description: "Total Lower 48 dry gas production (BCF/d). Ticker: GSPRODUS."
      - name: total_supply
        description: "Total supply = production + cad_imports."
      - name: lower_48_demand
        description: "Lower 48 demand = power_burn + industrial + rescom + plant_fuel + pipe_loss."
      - name: total_demand
        description: "Total demand = lower_48_demand + mexico_exports + lng."
      - name: implied_storage
        description: "Implied storage = total_supply - total_demand."
      - name: balancing_item
        description: "Balancing item = implied_storage - storage."
