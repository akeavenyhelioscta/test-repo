version: 2

models:
  - name: source_v1_bbg_tickers
    description: "Ephemeral extraction of the raw Bloomberg DAPI tickers table with explicit casts."
    columns:
      - name: security
        description: '{{ doc("bbg_dapi_col_security") }}'
        tests:
          - not_null
      - name: description
        description: '{{ doc("bbg_dapi_col_description") }}'
      - name: created_at
        description: '{{ doc("bbg_dapi_col_created_at") }}'
      - name: updated_at
        description: '{{ doc("bbg_dapi_col_updated_at") }}'

  - name: source_v1_bbg_historical
    description: "Ephemeral extraction of the raw Bloomberg DAPI historical table with explicit casts."
    columns:
      - name: security
        description: '{{ doc("bbg_dapi_col_security") }}'
        tests:
          - not_null
      - name: date
        description: '{{ doc("bbg_dapi_col_date") }}'
        tests:
          - not_null
      - name: snapshot_at
        description: '{{ doc("bbg_dapi_col_snapshot_at") }}'
        tests:
          - not_null
      - name: data_type
        description: '{{ doc("bbg_dapi_col_data_type") }}'
        tests:
          - not_null
      - name: value
        description: '{{ doc("bbg_dapi_col_value") }}'
      - name: created_at
        description: '{{ doc("bbg_dapi_col_created_at") }}'
      - name: updated_at
        description: '{{ doc("bbg_dapi_col_updated_at") }}'
