version: 2

models:
  - name: bbg_dapi_historical
    description: '{{ doc("bbg_dapi_mart_historical") }}'
    columns:
      - name: date
        description: '{{ doc("bbg_dapi_col_date") }}'
        tests:
          - not_null
      - name: snapshot_at
        description: '{{ doc("bbg_dapi_col_snapshot_at") }}'
        tests:
          - not_null
      - name: revision
        description: '{{ doc("bbg_dapi_col_revision") }}'
        tests:
          - not_null
      - name: max_revision
        description: '{{ doc("bbg_dapi_col_max_revision") }}'
        tests:
          - not_null
      - name: security
        description: '{{ doc("bbg_dapi_col_security") }}'
        tests:
          - not_null
          - relationships:
              to: ref('source_v1_bbg_tickers')
              field: security
      - name: description
        description: '{{ doc("bbg_dapi_col_description") }}'
      - name: data_type
        description: '{{ doc("bbg_dapi_col_data_type") }}'
        tests:
          - not_null
      - name: value
        description: '{{ doc("bbg_dapi_col_value") }}'
    tests:
      - unique:
          column_name: "security || '~' || date::TEXT || '~' || snapshot_at::TEXT || '~' || data_type"

  - name: bbg_gas_supply_demand
    description: '{{ doc("bbg_dapi_mart_gas_supply_demand") }}'
    columns:
      - name: date
        description: "Observation date."
        tests:
          - not_null
          - unique
      - name: snapshot_at
        description: "Latest snapshot timestamp for this date across all securities."
        tests:
          - not_null
      - name: revision
        description: "Number of distinct snapshots recorded for this date (equals max_revision since view shows consolidated latest)."
        tests:
          - not_null
      - name: max_revision
        description: "Total number of distinct snapshots recorded for this date."
        tests:
          - not_null
      - name: elec_cdd
        description: "Electric CDD. Ticker: HISTCNEC."
      - name: elec_hdd
        description: "Electric HDD. Ticker: HISTCNEH."
      - name: gas_cdd
        description: "Gas CDD. Ticker: HISTCNGC."
      - name: gas_hdd
        description: "Gas HDD. Ticker: HISTCNGH."
      - name: total_supply
        description: "Total supply = production + cad_imports (BCF/d)."
      - name: production
        description: "Total Lower 48 dry gas production (BCF/d). Ticker: GSPRODUS."
      - name: appalachia
        description: "Appalachia production (BCF/d). Ticker: GSPRDAPP."
      - name: bakken
        description: "Bakken production (BCF/d). Ticker: GSPRDBAK."
      - name: gulf
        description: "Gulf production (BCF/d). Ticker: GSPRDGLF."
      - name: haynesville
        description: "Haynesville production (BCF/d). Ticker: GSPRDHNV."
      - name: midcon
        description: "Midcon production (BCF/d). Ticker: GSPRDMCN."
      - name: mw_east
        description: "Midwest East production (BCF/d). Ticker: GSPRDMEA."
      - name: mw_west
        description: "Midwest West production (BCF/d). Ticker: GSPRDMWE."
      - name: north_east
        description: "Northeast production (BCF/d). Ticker: GSPRDNEA."
      - name: new_england
        description: "New England production (BCF/d). Ticker: GSPRDNEN."
      - name: pac_nw
        description: "Pacific NW production (BCF/d). Ticker: GSPRDPNW."
      - name: permian
        description: "Permian production (BCF/d). Ticker: GSPRDPRM."
      - name: rockies
        description: "Rockies production (BCF/d). Ticker: GSPRDROC."
      - name: southeast
        description: "Southeast production (BCF/d). Ticker: GSPRDSEA."
      - name: southwest
        description: "Southwest production (BCF/d). Ticker: GSPRDSWE."
      - name: cad_imports
        description: "Total Canada imports (BCF/d). Ticker: GSFLCTOT."
      - name: cad_to_north_east
        description: "Canada to Northeast imports (BCF/d). Ticker: GSFLCANE."
      - name: cad_to_new_england
        description: "Canada to New England imports (BCF/d). Ticker: GSFLCAEN."
      - name: cad_to_midwest
        description: "Canada to Midwest imports (BCF/d). Ticker: GSFLCAWW."
      - name: cad_to_michigan
        description: "Canada to Michigan imports (BCF/d). Ticker: GSFLCAMW."
      - name: cad_to_bakken
        description: "Canada to Bakken imports (BCF/d). Ticker: GSFLCABA."
      - name: cad_to_pac_nw
        description: "Canada to Pacific NW imports (BCF/d). Ticker: GSFLCAPN."
      - name: lower_48_demand
        description: "Lower 48 demand = power_burn + industrial + rescom + plant_fuel + pipe_loss (BCF/d)."
      - name: power_burn
        description: "Power burn demand (BCF/d). Ticker: GSDEDUSP."
      - name: industrial
        description: "Industrial demand (BCF/d). Ticker: GSDEDUSI."
      - name: rescom
        description: "Residential/commercial demand (BCF/d). Ticker: GSDEDUSR."
      - name: plant_fuel
        description: "Plant fuel demand (BCF/d). Ticker: GSDEDUSF."
      - name: pipe_loss
        description: "Pipeline loss (BCF/d). Ticker: GSDEDUSD."
      - name: mexico_exports
        description: "Total Mexico exports (BCF/d). Ticker: GSFLUSMX."
      - name: gulf_to_mexico
        description: "Gulf to Mexico exports (BCF/d). Ticker: GSFLMNMX."
      - name: sw_to_mexico
        description: "Southwest to Mexico exports (BCF/d). Ticker: GSFLPAMX."
      - name: cali_to_mexico
        description: "California to Mexico exports (BCF/d). Ticker: GSFLSCMX."
      - name: lng
        description: "Total LNG exports, absolute value (BCF/d). Ticker: GSLIQTOT."
      - name: sabine
        description: "Sabine Pass LNG (BCF/d). Ticker: GSLIQSPI."
      - name: cameron
        description: "Cameron LNG (BCF/d). Ticker: GSLIQCAM."
      - name: corpus
        description: "Corpus Christi LNG (BCF/d). Ticker: GSLIQCCH."
      - name: cove_point
        description: "Cove Point LNG (BCF/d). Ticker: GSLIQCOV."
      - name: elba
        description: "Elba Island LNG (BCF/d). Ticker: GSLIQELB."
      - name: freeport
        description: "Freeport LNG (BCF/d). Ticker: GSLIQFPT."
      - name: calcasieu
        description: "Calcasieu Pass LNG (BCF/d). Ticker: GSLIQCLC."
      - name: plaquemines
        description: "Plaquemines LNG (BCF/d). Ticker: GSLIQPLQ."
      - name: total_demand
        description: "Total demand = lower_48_demand + mexico_exports + lng (BCF/d)."
      - name: net_storage_change
        description: "Bloomberg reported net storage change (BCF/d). Ticker: GSFLDUSS."
      - name: net_implied_storage_change
        description: "Implied storage = total_supply - total_demand (BCF/d)."
      - name: balancing_item
        description: "Balancing item = implied_storage - storage (BCF/d)."
      - name: salt
        description: "Salt storage (BCF/d). Ticker: GSTMSMPL."
