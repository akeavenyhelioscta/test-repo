version: 2

models:
  - name: utils_v1_ice_gas_day_dates_daily
    description: >
      Daily date spine mapping calendar dates to gas days and trade dates.
      Gas day = trade_date + 1 (the delivery date following the trade date).
      Grain: one row per calendar date.
    columns:
      - name: date
        description: '{{ doc("ice_python_col_date") }}'
        tests:
          - not_null
      - name: gas_day
        description: '{{ doc("ice_python_col_gas_day") }}'
        tests:
          - not_null
      - name: trade_date
        description: '{{ doc("ice_python_col_trade_date") }}'
        tests:
          - not_null

  - name: utils_v1_ice_gas_day_dates_hourly
    description: >
      Hourly date spine mapping hourly timestamps to gas days and trade dates.
      Hours 1-10 belong to the current date's gas day; hours 11-24 belong to the next day's gas day.
      Grain: one row per calendar date x hour_ending.
    columns:
      - name: datetime
        description: '{{ doc("ice_python_col_datetime") }}'
        tests:
          - not_null
      - name: date
        description: '{{ doc("ice_python_col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("ice_python_col_hour_ending") }}'
        tests:
          - not_null
      - name: gas_day
        description: '{{ doc("ice_python_col_gas_day") }}'
        tests:
          - not_null
      - name: trade_date
        description: '{{ doc("ice_python_col_trade_date") }}'
        tests:
          - not_null


