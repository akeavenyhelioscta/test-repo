      - name: michcon_cash
        description: "MichCon daily cash price ($/MMBtu)."
      - name: columbia_tco_cash
        description: "Columbia TCO Pool daily cash price ($/MMBtu)."
      - name: transco_z6_ny_cash
        description: "Transco Zone 6 NY daily cash price ($/MMBtu)."
      - name: dominion_south_cash
        description: "Dominion South (Eastern Gas-South) daily cash price ($/MMBtu)."
      - name: transco_z5_north_cash
        description: "Transco Zone 5 North (non-WGL) daily cash price ($/MMBtu)."
      - name: tetco_m2_cash
        description: "Tetco M2 (Receipt) daily cash price ($/MMBtu)."
      - name: tenn_z4_marcellus_cash
        description: "Tennessee Z4 Marcellus daily cash price ($/MMBtu)."
      - name: transco_leidy_cash
        description: "Transco Leidy daily cash price ($/MMBtu)."
      - name: nng_ventura_cash
        description: "Northern Natural Gas Ventura daily cash price ($/MMBtu)."
      - name: chicago_cg_cash
        description: "Chicago CityGate (NGPL-Nicor) daily cash price ($/MMBtu)."

  - name: staging_v1_options_greeks
    description: >
      Latest-snapshot options chain per day. Filters to the last
      snapshot_at per trade_date so each symbol appears once per day
      with its EOD Greek values. Grain: one row per trade_date x symbol.
    columns:
      - name: trade_date
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: option_type
        tests:
          - accepted_values:
              values: ['call', 'put']

  - name: staging_v1_options_greeks_daily
    description: >
      Aggregated daily options summary per underlying and expiration.
      Computes put/call volume, OI, P/C ratios, ATM Greeks, and
      OI-weighted average strike. Grain: one row per trade_date x
      underlying x expiry_code.
    columns:
      - name: trade_date
        tests:
          - not_null
      - name: underlying
        tests:
          - not_null
      - name: expiry_code
        tests:
          - not_null
