version: 2

models:
  - name: staging_v1_ice_balmo
    description: >
      Forward-filled ICE BALMO prices. Uses window-based forward fill to
      propagate the last known settle price forward through weekends and
      holidays. Filtered to only include rows up to the latest date with
      actual data. Grain: one row per trade_date.
    columns:
      - name: gas_day
        description: '{{ doc("ice_python_col_gas_day") }}'
      - name: trade_date
        description: '{{ doc("ice_python_col_trade_date") }}'
        tests:
          - not_null
      - name: hh_balmo
        description: '{{ doc("ice_python_col_hh_balmo") }}'
      - name: transco_st85_balmo
        description: "Transco Station 85 BALMO settle price, forward-filled ($/MMBtu)."
      - name: pine_prarie_balmo
        description: "Pine Prairie BALMO settle price, forward-filled ($/MMBtu)."
      - name: houston_ship_channel_balmo
        description: "Houston Ship Channel BALMO settle price, forward-filled ($/MMBtu)."
      - name: waha_balmo
        description: "Waha BALMO settle price, forward-filled ($/MMBtu)."
      - name: ngpl_txok_balmo
        description: "NGPL TX/OK BALMO settle price, forward-filled ($/MMBtu)."
      - name: transco_zone_5_south_balmo
        description: "Transco Zone 5 South BALMO settle price, forward-filled ($/MMBtu)."
      - name: tetco_m3_balmo
        description: "Tetco M3 BALMO settle price, forward-filled ($/MMBtu)."
      - name: agt_balmo
        description: "AGT BALMO settle price, forward-filled ($/MMBtu)."
      - name: iroquois_z2_balmo
        description: "Iroquois Zone 2 BALMO settle price, forward-filled ($/MMBtu)."
      - name: socal_cg_balmo
        description: "SoCal Citygate BALMO settle price, forward-filled ($/MMBtu)."
      - name: pge_cg_balmo
        description: "PG&E Citygate BALMO settle price, forward-filled ($/MMBtu)."
      - name: cig_balmo
        description: "CIG BALMO settle price, forward-filled ($/MMBtu)."
      - name: ngpl_midcon_balmo
        description: "NGPL Midcontinent BALMO settle price, forward-filled ($/MMBtu)."
      - name: michcon_balmo
        description: "MichCon BALMO settle price, forward-filled ($/MMBtu)."

  - name: staging_v1_ice_next_day_gas_hourly
    description: >
      Forward-filled ICE next-day gas hourly prices. Uses window-based
      forward fill to propagate the last known cash price forward through
      weekends and holidays. Filtered to valid range.
      Grain: one row per datetime (date x hour_ending).
    columns:
      - name: datetime
        description: '{{ doc("ice_python_col_datetime") }}'
        tests:
          - not_null
      - name: date
        description: '{{ doc("ice_python_col_date") }}'
        tests:
          - not_null
      - name: hour_ending
        description: '{{ doc("ice_python_col_hour_ending") }}'
        tests:
          - not_null
      - name: gas_day
        description: '{{ doc("ice_python_col_gas_day") }}'
      - name: trade_date
        description: '{{ doc("ice_python_col_trade_date") }}'
        tests:
          - not_null
      - name: hh_cash
        description: '{{ doc("ice_python_col_hh_cash") }}'
      - name: transco_st85_cash
        description: "Transco Station 85 next-day cash, forward-filled ($/MMBtu)."
      - name: pine_prarie_cash
        description: "Pine Prairie next-day cash, forward-filled ($/MMBtu)."
      - name: waha_cash
        description: "Waha next-day cash, forward-filled ($/MMBtu)."
      - name: houston_ship_channel_cash
        description: "Houston Ship Channel next-day cash, forward-filled ($/MMBtu)."
      - name: ngpl_txok_cash
        description: "NGPL TX/OK next-day cash, forward-filled ($/MMBtu)."
      - name: transco_zone_5_south_cash
        description: "Transco Zone 5 South next-day cash, forward-filled ($/MMBtu)."
      - name: tetco_m3_cash
        description: "Tetco M3 next-day cash, forward-filled ($/MMBtu)."
      - name: agt_cash
        description: "AGT next-day cash, forward-filled ($/MMBtu)."
      - name: iroquois_z2_cash
        description: "Iroquois Zone 2 next-day cash, forward-filled ($/MMBtu)."
      - name: socal_cg_cash
        description: "SoCal Citygate next-day cash, forward-filled ($/MMBtu)."
      - name: pge_cg_cash
        description: "PG&E Citygate next-day cash, forward-filled ($/MMBtu)."
      - name: cig_cash
        description: "CIG next-day cash, forward-filled ($/MMBtu)."
      - name: ngpl_midcon_cash
        description: "NGPL Midcontinent next-day cash, forward-filled ($/MMBtu)."
      - name: michcon_cash
        description: "MichCon next-day cash, forward-filled ($/MMBtu)."
      - name: columbia_tco_cash
        description: "Columbia TCO Pool next-day cash, forward-filled ($/MMBtu)."
      - name: transco_z6_ny_cash
        description: "Transco Zone 6 NY next-day cash, forward-filled ($/MMBtu)."
      - name: dominion_south_cash
        description: "Dominion South (Eastern Gas-South) next-day cash, forward-filled ($/MMBtu)."
      - name: transco_z5_north_cash
        description: "Transco Zone 5 North (non-WGL) next-day cash, forward-filled ($/MMBtu)."
      - name: tetco_m2_cash
        description: "Tetco M2 (Receipt) next-day cash, forward-filled ($/MMBtu)."
      - name: tenn_z4_marcellus_cash
        description: "Tennessee Z4 Marcellus next-day cash, forward-filled ($/MMBtu)."
      - name: transco_leidy_cash
        description: "Transco Leidy next-day cash, forward-filled ($/MMBtu)."
      - name: nng_ventura_cash
        description: "Northern Natural Gas Ventura next-day cash, forward-filled ($/MMBtu)."
      - name: chicago_cg_cash
        description: "Chicago CityGate (NGPL-Nicor) next-day cash, forward-filled ($/MMBtu)."

  - name: staging_v1_ice_next_day_gas_daily
    description: >
      Daily next-day gas prices derived from the 10 AM hour snapshot of
      the hourly forward-filled data. Grain: one row per gas_day x trade_date.
    columns:
      - name: gas_day
        description: '{{ doc("ice_python_col_gas_day") }}'
        tests:
          - not_null
      - name: trade_date
        description: '{{ doc("ice_python_col_trade_date") }}'
        tests:
          - not_null
      - name: hh_cash
        description: '{{ doc("ice_python_col_hh_cash") }}'
      - name: transco_st85_cash
        description: "Transco Station 85 daily cash price ($/MMBtu)."
      - name: pine_prarie_cash
        description: "Pine Prairie daily cash price ($/MMBtu)."
      - name: waha_cash
        description: "Waha daily cash price ($/MMBtu)."
      - name: houston_ship_channel_cash
        description: "Houston Ship Channel daily cash price ($/MMBtu)."
      - name: ngpl_txok_cash
