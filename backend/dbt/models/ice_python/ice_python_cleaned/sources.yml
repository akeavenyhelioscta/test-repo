version: 2

sources:

  - name: ice_python_v1
    schema: ice_python
    description: '{{ doc("ice_python_overview") }}'
    tables:
      - name: next_day_gas_v1_2025_dec_16
        description: '{{ doc("ice_python_next_day_gas_source") }}'
      - name: balmo_v1_2025_dec_16
        description: '{{ doc("ice_python_balmo_source") }}'
      - name: options_greeks
        description: >
          Raw ICE options Greeks snapshot data. One row per trade_date x
          snapshot_at x symbol. Contains exchange Greeks (delta, gamma,
          theta, vega, rho), market data (settle, bid, ask, last, volume,
          open_interest), and option metadata (strike, expiration,
          underlying, option_type). Snapshots captured every 15 minutes
          during market hours via ice.get_quotes().

