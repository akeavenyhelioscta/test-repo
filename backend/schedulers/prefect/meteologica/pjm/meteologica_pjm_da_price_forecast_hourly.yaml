name: helioscta-meteologica-pjm-da-price

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── Meteologica PJM DA Price Forecast Hourly ──────
  # Hourly umbrella: scrape Meteologica Western-Hub DA price forecasts
  # (deterministic + ECMWF ensemble), rebuild the dbt DA-cutoff price mart,
  # then export the mart to parquet (backend cache, modelling cache, Azure blob).

  - name: Meteologica PJM DA Price Forecast Hourly
    entrypoint: schedulers/prefect/meteologica/pjm/meteologica_pjm_da_price_forecast_hourly_flows.py:meteologica_pjm_da_price_forecast_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, meteologica, da_price, forecast_hourly]
    schedules:

      # ────── Hourly at :35 EPT ──────
      # Meteologica issues updates every 30 min on the quarter (e.g. :15, :45);
      # running at :35 EPT catches the :15 issue after it has fully propagated.
      - cron: "35 * * * *"
        timezone: "America/New_York"
