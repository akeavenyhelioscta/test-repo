name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM LMPs Hourly ──────
  # Daily poll for next-day DA prices with tenacity retries

  - name: Power - PJM LMPs Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_lmps_hourly_flows.py:pjm_lmps_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, lmps_hourly]
    schedules:

      # ────── Daily run at 11:00 AM MST (1:00 PM EPT), polls every 10s until data lands ──────
      - cron: "0 11 * * *"
        timezone: "America/Denver"

  # ────── PJM LMPs Hourly Backfill ──────
  # 7-day lookback backfill, no polling

  - name: Power - PJM LMPs Hourly Backfill
    entrypoint: schedulers/prefect/power/pjm/pjm_lmps_hourly_flows.py:pjm_lmps_hourly_backfill
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, lmps_hourly, backfill]
    schedules:

      # ────── Daily backfill at 6:00 AM MST, data already available ──────
      - cron: "0 6 * * *"
        timezone: "America/Denver"
