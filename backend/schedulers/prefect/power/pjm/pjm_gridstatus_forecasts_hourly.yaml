name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM GridStatus Forecasts Hourly (Load, Solar, Wind) ──────
  # Hourly scrape of latest GridStatus-sourced PJM forecasts (load 2x/hr, solar/wind ~10-min cadence)

  - name: Power - PJM GridStatus Forecasts Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_gridstatus_forecasts_hourly_flows.py:pjm_gridstatus_forecasts_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, gridstatus, forecast_hourly]
    schedules:

      # ────── Hourly at the top of the hour ──────
      - cron: "0 * * * *"
        timezone: "America/Denver"
