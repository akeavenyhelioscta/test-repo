name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Load Forecast Hourly ──────
  # Hourly scrape of latest PJM load forecast (updated twice per hour, only latest revision retained)

  - name: Power - PJM Load Forecast Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_load_forecast_hourly_flows.py:pjm_load_forecast_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, load_forecast_hourly]
    schedules:

      # ────── Hourly at the top of the hour ──────
      - cron: "0 * * * *"
        timezone: "America/Denver"
