name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Fuel Mix Hourly ──────
  # Hourly scrape of GridStatus PJM fuel mix; incremental merge into pjm_cleaned.

  - name: Power - PJM Fuel Mix Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_fuel_mix_hourly_flows.py:pjm_fuel_mix_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, gridstatus, fuel_mix]
    schedules:

      # ────── Hourly at :15, staggered after pjm_gridstatus_forecasts (:00) ──────
      - cron: "15 * * * *"
        timezone: "America/Denver"
