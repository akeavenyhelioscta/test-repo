name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Fuel Mix Hourly ──────
  # Hourly umbrella: scrape gridstatus PJM fuel mix, rebuild dbt
  # fuel-mix mart, export parquet.
  #
  # gridstatus feed is hourly. We run 10 minutes past the hour —
  # small stagger off tie-flows (:05) and forecasts (:00).

  - name: Power - PJM Fuel Mix Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_fuel_mix_hourly_flows.py:pjm_fuel_mix_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, fuel_mix_hourly]
    schedules:

      # ────── Hourly at :10 ──────
      - cron: "10 * * * *"
        timezone: "America/Denver"
