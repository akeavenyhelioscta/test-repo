name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Tie Flows Hourly ──────
  # Hourly scrape of PJM 5-min tie flows; incremental merge into pjm_cleaned.

  - name: Power - PJM Tie Flows Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_tie_flows_hourly_flows.py:pjm_tie_flows_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, tie_flows_hourly]
    schedules:

      # ────── Hourly at :30, staggered after fuel_mix (:15) and gridstatus_forecasts (:00) ──────
      - cron: "30 * * * *"
        timezone: "America/Denver"
