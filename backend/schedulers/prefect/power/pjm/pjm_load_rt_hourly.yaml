name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Load RT Hourly ──────
  # Hourly scrape of PJM RT load (metered + prelim + 5-min instantaneous), then dbt

  - name: Power - PJM Load RT Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_load_rt_hourly_flows.py:pjm_load_rt_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, load_rt_hourly]
    schedules:

      # ────── Hourly at the top of the hour ──────
      - cron: "0 * * * *"
        timezone: "America/Denver"
