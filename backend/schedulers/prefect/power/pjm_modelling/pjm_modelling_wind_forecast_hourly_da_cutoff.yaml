name: helioscta-power-pjm-modelling

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Modelling Wind Forecast Hourly DA Cutoff ──────
  # Refreshes pjm_modelling.pjm_modelling_wind_forecast_hourly_da_cutoff and syncs to blob.

  - name: Power - PJM Modelling Wind Forecast Hourly DA Cutoff
    entrypoint: schedulers/prefect/power/pjm_modelling/pjm_modelling_wind_forecast_hourly_da_cutoff_flows.py:pjm_modelling_wind_forecast_hourly_da_cutoff
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, pjm_modelling, wind_forecast_da_cutoff]
    schedules:

      # ────── Daily at 4:15 AM MST (6:15 AM EPT), staggered after solar forecast ──────
      - cron: "15 4 * * *"
        timezone: "America/Denver"
