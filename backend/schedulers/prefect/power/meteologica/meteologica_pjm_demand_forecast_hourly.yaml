name: helioscta-power-meteologica

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── Meteologica PJM Demand Forecast Hourly ──────
  # Hourly scrape of 36 Meteologica PJM regional demand forecast contents;
  # incremental merge into meteologica_cleaned.meteologica_pjm_demand_forecast_hourly.

  - name: Power - Meteologica PJM Demand Forecast Hourly
    entrypoint: schedulers/prefect/power/meteologica/meteologica_pjm_demand_forecast_hourly_flows.py:meteologica_pjm_demand_forecast_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, meteologica, demand_forecast]
    schedules:

      # ────── Hourly at :30, staggered from PJM-native flows (:00, :15) ──────
      - cron: "30 * * * *"
        timezone: "America/Denver"
